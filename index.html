{id:'tdd-cycle',topic:'tdd',sub:'podstawy',title:'TDD — cykl Red-Green-Refactor',difficulty:'★☆☆',
teaser:'Najpierw test, potem kod. Red: test nie przechodzi. Green: minimalny kod. Refactor: czyść bez zmiany zachowania.',
def:`<div class="def-block"><strong>Test-Driven Development</strong> to technika, w której każda linijka kodu produkcyjnego jest poprzedzona testem. TDD nie jest "testowaniem" — to technika <strong>projektowania</strong> kodu przez specyfikację zachowania.</div>
<div class="steps">
<div class="step"><div class="step-num sn-r">R</div><div class="step-body"><div class="step-title" style="color:var(--red)">RED — napisz test który nie przechodzi</div>Definiujesz oczekiwane zachowanie. Test kompiluje się, ale failuje — bo kodu jeszcze nie ma. Nie rób nic więcej.</div></div>
<div class="step"><div class="step-num sn-g">G</div><div class="step-body"><div class="step-title" style="color:var(--green)">GREEN — napisz minimalny kod</div>Najprostszy możliwy kod który sprawia że test przechodzi. Nie projektuj na zapas. Nawet hardcode jest OK jeśli test przechodzi.</div></div>
<div class="step"><div class="step-num sn-b">F</div><div class="step-body"><div class="step-title" style="color:var(--a-bdd)">REFACTOR — popraw nie zmieniając zachowania</div>Eliminuj duplikaty, poprraw nazwy, wyciągnij abstrakcje. Testy są siatką bezpieczeństwa — czerwony test = stop.</div></div>
</div>
<ul class="key-points">
<li>Wymusza dobry design API: piszesz test = jesteś pierwszym klientem API</li>
<li>100% pokrycie jest efektem ubocznym, nie celem</li>
<li>Cykl trwa 2–10 minut — nie 2 godziny</li>
</ul>`,
code:`<div class="code-label">Pełny cykl TDD na prostym przykładzie</div>
<pre><span class="c-cmt">// 🔴 RED — test przed implementacją</span>
<span class="c-ann">@Test</span>
<span class="c-kw">void</span> <span class="c-fn">should_calculate_10pct_discount_for_premium_tier</span>() {
    <span class="c-type">PricingService</span> svc = <span class="c-kw">new</span> <span class="c-type">PricingService</span>();
    <span class="c-type">Money</span> base    = <span class="c-type">Money</span>.<span class="c-fn">of</span>(<span class="c-str">"100.00"</span>, PLN);
    <span class="c-type">Customer</span> vip  = <span class="c-type">Customer</span>.<span class="c-fn">withTier</span>(<span class="c-type">Tier</span>.PREMIUM);

    <span class="c-type">Money</span> result = svc.<span class="c-fn">priceFor</span>(base, vip);

    <span class="c-fn">assertThat</span>(result).isEqualTo(<span class="c-type">Money</span>.<span class="c-fn">of</span>(<span class="c-str">"90.00"</span>, PLN));
}   <span class="c-cmt">// ❌ kompilacja — PricingService nie istnieje</span>

<span class="c-cmt">// 🟢 GREEN — minimalny kod (nawet if-hardcode jest OK!)</span>
<span class="c-kw">class</span> <span class="c-type">PricingService</span> {
    <span class="c-type">Money</span> <span class="c-fn">priceFor</span>(<span class="c-type">Money</span> base, <span class="c-type">Customer</span> c) {
        <span class="c-kw">return</span> c.<span class="c-fn">isPremium</span>() ? base.<span class="c-fn">multiply</span>(<span class="c-str">"0.90"</span>) : base;
    }
}   <span class="c-cmt">// ✅ test przechodzi</span>

<span class="c-cmt">// 🔵 REFACTOR — po dodaniu kolejnych testów</span>
<span class="c-kw">class</span> <span class="c-type">PricingService</span> {
    <span class="c-kw">private static final</span> <span class="c-type">Map</span>&lt;<span class="c-type">Tier</span>, <span class="c-type">BigDecimal</span>&gt; DISCOUNTS = <span class="c-type">Map</span>.<span class="c-fn">of</span>(
        <span class="c-type">Tier</span>.PREMIUM, <span class="c-kw">new</span> <span class="c-type">BigDecimal</span>(<span class="c-str">"0.90"</span>),
        <span class="c-type">Tier</span>.VIP,     <span class="c-kw">new</span> <span class="c-type">BigDecimal</span>(<span class="c-str">"0.80"</span>),
        <span class="c-type">Tier</span>.STANDARD,<span class="c-type">BigDecimal</span>.ONE
    );
    <span class="c-type">Money</span> <span class="c-fn">priceFor</span>(<span class="c-type">Money</span> base, <span class="c-type">Customer</span> c) {
        <span class="c-kw">return</span> base.<span class="c-fn">multiply</span>(DISCOUNTS.<span class="c-fn">get</span>(c.<span class="c-fn">getTier</span>()));
    }
}   <span class="c-cmt">// ✅ wszystkie testy przechodzą</span></pre>`,
interview:[
{q:'Co to jest TDD i jakie przynosi korzyści?',a:'TDD to technika: piszesz test przed kodem produkcyjnym, w cyklu Red→Green→Refactor. Korzyści: (1) Design — pisząc test jesteś pierwszym klientem API, wymusza przemyślenie interfejsu. (2) Bezpieczeństwo refaktoryzacji — testy jako siatka bezpieczeństwa. (3) Dokumentacja — testy opisują zachowanie. (4) Luźne powiązanie — kod który jest trudny do testowania jest źle zaprojektowany.'},
{q:'TDD a "pisanie testów po kodzie" — jaka różnica?',a:'TDD wpływa na design — pisząc test najpierw, projektujesz API zanim je napiszesz, co wymusza dobre praktyki (dependency injection, SRP). Testy po kodzie często testują implementację zamiast zachowania i są trudniejsze do napisania dla "twardego" kodu. Pokrycie po kodzie to "sprawdzanie czy kod robi to co robi", TDD to "sprawdzanie czy kod robi to co powinien robić".'},
]},

{id:'tdd-pyramid',topic:'tdd',sub:'rodzaje testów',title:'Piramida testów i rodzaje',difficulty:'★★☆',
teaser:'Unit → Integration → E2E. 70/20/10. Więcej szybkich, mniej wolnych. Odwrócona piramida to antywzorzec.',
def:`<div class="def-block">Piramida testów (Mike Cohn) opisuje optymalne proporcje rodzajów testów. Im wyżej — test wolniejszy, bardziej kruchy, droższy w utrzymaniu.</div>
<table class="ctable">
<tr><th>Poziom</th><th>Co testuje</th><th>Czas</th><th>Proporcja</th></tr>
<tr><td><strong>Unit</strong></td><td>Jedna klasa w izolacji (mocki dla deps)</td><td class="yes">ms</td><td class="yes">~70%</td></tr>
<tr><td><strong>Integration</strong></td><td>Kilka komponentów, realna baza (Testcontainers)</td><td>sekundy</td><td>~20%</td></tr>
<tr><td><strong>E2E / System</strong></td><td>Cały system od UI do bazy</td><td class="no">minuty</td><td class="no">~10%</td></tr>
</table>
<div class="warn-block"><div class="warn-label">Odwrócona piramida (antywzorzec)</div>Głównie E2E — wolne buildy, kruche testy (zmiana CSS łamie testy), trudne debugowanie. Każda zmiana UI może skasować dziesiątki testów.</div>
<ul class="key-points">
<li>Honeycomb (Spotify) — duże aplikacje mogą preferować testy serwisowe zamiast unit</li>
<li>Testcontainers — realna baza w kontenerze Docker w testach integracyjnych</li>
<li>Contract testing (Pact) — zamiast E2E dla mikroserwisów</li>
</ul>`,
code:`<div class="code-label">Unit vs Integration — co i jak testować</div>
<pre><span class="c-cmt">// UNIT TEST — izolacja, prędkość, jedno zachowanie</span>
<span class="c-ann">@Test</span>
<span class="c-kw">void</span> <span class="c-fn">order_total_includes_all_items</span>() {
    <span class="c-type">Order</span> order = <span class="c-type">Order</span>.<span class="c-fn">createDraft</span>(<span class="c-type">CustomerId</span>.<span class="c-fn">random</span>(), <span class="c-type">Clock</span>.<span class="c-fn">systemUTC</span>());
    order.<span class="c-fn">addItem</span>(pid1, <span class="c-type">Qty</span>.<span class="c-fn">of</span>(<span class="c-num">2</span>), <span class="c-type">Money</span>.<span class="c-fn">of</span>(<span class="c-num">50</span>));
    order.<span class="c-fn">addItem</span>(pid2, <span class="c-type">Qty</span>.<span class="c-fn">of</span>(<span class="c-num">1</span>), <span class="c-type">Money</span>.<span class="c-fn">of</span>(<span class="c-num">30</span>));
    <span class="c-fn">assertThat</span>(order.<span class="c-fn">getTotal</span>()).<span class="c-fn">isEqualTo</span>(<span class="c-type">Money</span>.<span class="c-fn">of</span>(<span class="c-num">130</span>)); <span class="c-cmt">// 2*50 + 30</span>
}

<span class="c-cmt">// INTEGRATION TEST — realna baza przez Testcontainers</span>
<span class="c-ann">@SpringBootTest</span>
<span class="c-ann">@Testcontainers</span>
<span class="c-kw">class</span> <span class="c-type">OrderRepositoryIT</span> {
    <span class="c-ann">@Container</span>
    <span class="c-kw">static</span> <span class="c-type">PostgreSQLContainer</span>&lt;?&gt; pg = <span class="c-kw">new</span> <span class="c-type">PostgreSQLContainer</span>&lt;&gt;(<span class="c-str">"postgres:16"</span>);

    <span class="c-ann">@Test</span>
    <span class="c-kw">void</span> <span class="c-fn">persists_and_reloads_order_preserving_status</span>() {
        <span class="c-type">Order</span> order = <span class="c-type">OrderFixture</span>.<span class="c-fn">confirmedOrder</span>();
        repo.<span class="c-fn">save</span>(order);

        <span class="c-type">Order</span> loaded = repo.<span class="c-fn">findById</span>(order.<span class="c-fn">getId</span>()).<span class="c-fn">orElseThrow</span>();
        <span class="c-fn">assertThat</span>(loaded.<span class="c-fn">getStatus</span>()).<span class="c-fn">isEqualTo</span>(<span class="c-type">OrderStatus</span>.CONFIRMED);
    }
}</pre>`,
interview:[
{q:'Wyjaśnij piramidę testów i dlaczego odwrócona piramida jest antywzorcem.',a:'Piramida testów mówi: dużo unit testów (~70%), mniej integration (~20%), mało E2E (~10%). Im wyżej, tym test wolniejszy, bardziej kruchy i droższy. Odwrócona piramida (głównie E2E) to antywzorzec: wolne buildy (minuty vs ms), kruche testy (zmiana CSS łamie testy), trudne debugowanie (który serwis zawinił?). Dobry unit test zajmuje milisekundy i dokładnie pokazuje co się zepsuło.'},
]},

{id:'tdd-doubles',topic:'tdd',sub:'test doubles',title:'Mock, Stub, Spy, Fake',difficulty:'★★★',
teaser:'Cztery różne "sobowtóry testowe". Każdy robi co innego. Mylenie Mock ze Stubem to częsty błąd.',
def:`<div class="def-block">Test doubles to obiekty zastępujące prawdziwe zależności w testach. Martin Fowler rozróżnia 5 typów — każdy do czegoś innego.</div>
<table class="ctable">
<tr><th>Typ</th><th>Co robi</th><th>Weryfikuje?</th><th>Kiedy</th></tr>
<tr><td><strong>Dummy</strong></td><td>Przekazywany, nieużywany — placeholder</td><td class="no">Nie</td><td>Wypełnienie parametrów</td></tr>
<tr><td><strong>Stub</strong></td><td>Zwraca zaprogramowane dane</td><td class="no">Nie</td><td>Query dependencies</td></tr>
<tr><td><strong>Mock</strong></td><td>Stub + weryfikuje wywołania</td><td class="yes">Tak</td><td>Command dependencies</td></tr>
<tr><td><strong>Spy</strong></td><td>Prawdziwy obiekt + obserwacja wywołań</td><td>Częściowo</td><td>Legacy code</td></tr>
<tr><td><strong>Fake</strong></td><td>Uproszczona prawdziwa implementacja</td><td class="no">Nie</td><td>Repository, DB</td></tr>
</table>
<div class="ok-block"><div class="ok-label">Reguła kciuka</div>Stub dla query (pobierasz dane). Mock dla command (weryfikujesz efekt uboczny). Fake dla infrastructure (in-memory repo). Unikaj mockowania Value Objectów i wewnętrznych klas domenowych.</div>`,
code:`<div class="code-label">Stub / Mock / Fake w praktyce</div>
<pre><span class="c-cmt">// STUB — dane bez weryfikacji wywołań</span>
<span class="c-fn">when</span>(customerRepo.<span class="c-fn">findById</span>(cid))
    .<span class="c-fn">thenReturn</span>(<span class="c-type">Optional</span>.<span class="c-fn">of</span>(<span class="c-type">CustomerFixture</span>.<span class="c-fn">premium</span>()));

<span class="c-cmt">// MOCK — stub + WERYFIKACJA czy wywołano</span>
sut.<span class="c-fn">placeOrder</span>(cmd);
<span class="c-fn">verify</span>(emailSender, <span class="c-fn">times</span>(<span class="c-num">1</span>))
    .<span class="c-fn">sendConfirmation</span>(<span class="c-fn">eq</span>(cmd.<span class="c-fn">getCustomerId</span>()));

<span class="c-cmt">// FAKE — in-memory repo, test bez bazy danych</span>
<span class="c-kw">class</span> <span class="c-type">InMemoryOrderRepo</span> <span class="c-kw">implements</span> <span class="c-type">OrderRepository</span> {
    <span class="c-kw">private final</span> <span class="c-type">Map</span>&lt;<span class="c-type">OrderId</span>, <span class="c-type">Order</span>&gt; db = <span class="c-kw">new</span> <span class="c-type">HashMap</span>&lt;&gt;();
    <span class="c-kw">public</span> <span class="c-type">Optional</span>&lt;<span class="c-type">Order</span>&gt; <span class="c-fn">findById</span>(<span class="c-type">OrderId</span> id) {
        <span class="c-kw">return</span> <span class="c-type">Optional</span>.<span class="c-fn">ofNullable</span>(db.<span class="c-fn">get</span>(id));
    }
    <span class="c-kw">public void</span> <span class="c-fn">save</span>(<span class="c-type">Order</span> o) { db.<span class="c-fn">put</span>(o.<span class="c-fn">getId</span>(), o); }
}
<span class="c-cmt">// Fake lepszy niż Mock dla repo — testuje prawdziwe query</span>

<span class="c-cmt">// Porównanie — to samo zachowanie:</span>
<span class="c-cmt">// Mock sprawdza CZY emailSender.send() wywołany</span>
<span class="c-cmt">// Stub tylko udostępnia dane gdy ktoś zapyta</span></pre>`,
interview:[
{q:'Jaka jest różnica między Mock a Stub?',a:'Stub zwraca zaprogramowane dane bez weryfikacji — używamy gdy test potrzebuje danych z zależności, ale nie interesuje nas jak zależność była wywoływana. Mock robi to co stub, ale additionally weryfikuje interakcje — czy metoda była wywołana, ile razy, z jakimi argumentami. Zasada: stub dla query (pobieranie danych), mock dla command (operacje z efektem ubocznym np. wysłanie emaila). Mockowanie wszystkiego to antywzorzec — prowadzi do testów testujących implementację nie zachowanie.'},
]},

/* ════════════════════════════════════════════ BDD ════════════════════════════════════════════ */
{id:'bdd-intro',topic:'bdd',sub:'podstawy',title:'BDD — Given/When/Then',difficulty:'★★☆',
teaser:'TDD z perspektywy biznesowej. Testy jako żywa dokumentacja. Scenariusze w języku zrozumiałym dla PO i QA.',
def:`<div class="def-block"><strong>Behaviour-Driven Development</strong> rozszerza TDD o język biznesowy i kolaborację. Testy opisują <em>zachowanie systemu</em> z perspektywy użytkownika, w języku naturalnym (Gherkin: Given/When/Then). Są jednocześnie specyfikacją, testem i dokumentacją — <strong>living documentation</strong>.</div>
<div class="analogy-block"><div class="analogy-label">Analogia</div>Umowa z kontrahentem. TDD to notatka dla siebie ("pamiętaj żeby kod robił X"). BDD to umowa podpisana przez biznes i dev — oboje rozumieją i akceptują scenariusze.</div>
<ul class="key-points">
<li>Given = stan wyjściowy (kontekst)</li>
<li>When = akcja (zdarzenie)</li>
<li>Then = oczekiwany rezultat</li>
<li>Frameworki: Cucumber (JVM), SpecFlow (.NET), Behave (Python), Playwright + Cucumber (E2E)</li>
<li>BDD nie wymaga Cucumbera — możesz pisać testy w stylu GWT bez frameworku</li>
</ul>`,
code:`<div class="code-label">Gherkin + implementacja Cucumber</div>
<pre><span class="c-cmt"># orders.feature — napisane z Product Ownerem</span>
<span class="c-ann">Feature:</span> Składanie zamówień

  <span class="c-dec">Background:</span>
    <span class="c-ok">Given</span> sklep jest otwarty

  <span class="c-dec">Scenario:</span> Klient premium dostaje 10% zniżki
    <span class="c-ok">Given</span> jestem zalogowanym klientem premium
    <span class="c-ok">And</span>   produkt "Laptop XYZ" kosztuje 2000 PLN
    <span class="c-ok">When</span>  dodaję "Laptop XYZ" do koszyka i składam zamówienie
    <span class="c-ok">Then</span>  zamówienie ma wartość 1800 PLN
    <span class="c-ok">And</span>   widzę "Zniżka VIP: -200 PLN" na podsumowaniu

  <span class="c-dec">Scenario Outline:</span> Różne poziomy zniżek
    <span class="c-ok">Given</span> jestem klientem "&lt;tier&gt;"
    <span class="c-ok">When</span>  składam zamówienie za 1000 PLN
    <span class="c-ok">Then</span>  płacę &lt;final&gt; PLN
    <span class="c-dec">Examples:</span>
      | tier     | final |
      | standard | 1000  |
      | premium  | 900   |
      | vip      | 800   |</pre>
<div class="code-label">Step Definitions — Java</div>
<pre><span class="c-ann">@Given</span>(<span class="c-str">"jestem zalogowanym klientem premium"</span>)
<span class="c-kw">public void</span> <span class="c-fn">iAmLoggedAsPremium</span>() {
    customer = <span class="c-type">CustomerFixture</span>.<span class="c-fn">premium</span>();
    auth.<span class="c-fn">login</span>(customer);
}

<span class="c-ann">@When</span>(<span class="c-str">"dodaję {string} do koszyka i składam zamówienie"</span>)
<span class="c-kw">public void</span> <span class="c-fn">placeOrderWith</span>(<span class="c-type">String</span> productName) {
    order = orderService.<span class="c-fn">place</span>(customer, catalog.<span class="c-fn">find</span>(productName));
}

<span class="c-ann">@Then</span>(<span class="c-str">"zamówienie ma wartość {int} PLN"</span>)
<span class="c-kw">public void</span> <span class="c-fn">totalShouldBe</span>(<span class="c-type">int</span> pln) {
    <span class="c-fn">assertThat</span>(order.<span class="c-fn">getTotal</span>())
        .<span class="c-fn">isEqualTo</span>(<span class="c-type">Money</span>.<span class="c-fn">of</span>(pln, PLN));
}</pre>`,
interview:[
{q:'Czym jest BDD i czym różni się od TDD?',a:'BDD to rozszerzenie TDD skupione na komunikacji między biznesem a deweloperami. TDD definiuje co kod powinien robić technicznie (unit level). BDD definiuje jak system zachowuje się z perspektywy użytkownika (acceptance level), w języku zrozumiałym dla PO, QA i deweloperów. W BDD piszemy scenariusze Given/When/Then — są jednocześnie testem i living documentation. Nie są to techniki alternatywne — działają na różnych poziomach.'},
{q:'Co to jest living documentation?',a:'Living documentation to dokumentacja która jest jednocześnie kodem testowym — zawsze aktualna, bo jej nieaktualność = failing test. Scenariusze Cucumber opisują zachowanie systemu. Gdy system się zmienia i scenariusz przestaje przechodzić, dokumentacja jest nieaktualna. To odwrotność Word-dokumentów które deaktualizują się natychmiast po napisaniu.'},
]},

/* ════════════════════════════════════════════ CQRS ════════════════════════════════════════════ */
{id:'cqrs-basics',topic:'cqrs',sub:'podstawy',title:'CQRS — fundamenty',difficulty:'★★☆',
teaser:'Command zmienia stan, Query czyta stan. Nigdy oba naraz. Osobne modele dla zapisu i odczytu.',
def:`<div class="def-block"><strong>Command Query Responsibility Segregation</strong> — architektoniczne rozdzielenie operacji zmieniających stan (<strong>Command</strong>) od operacji odczytujących stan (<strong>Query</strong>). Pochodzi od CQS (Command-Query Separation) Bertranda Meyera — zasady na poziomie metod.</div>
<ul class="key-points">
<li><strong>Command</strong>: zmienia stan, nie zwraca danych (poza ewentualnym ID). Może fail. Wyraża intencję.</li>
<li><strong>Query</strong>: zwraca dane, nie zmienia stanu. Idempotentny.</li>
<li>Logiczne CQRS: jeden model, ale osobne handlery dla C i Q</li>
<li>Fizyczne CQRS: osobne bazy danych — write store (Aggregate) i read store (projekcja)</li>
<li>Naturalnie łączy się z DDD: Command strona = Aggregates, Query strona = płaskie projekcje</li>
</ul>
<div class="analogy-block"><div class="analogy-label">Analogia</div>Biblioteka. Wyszukiwarka katalogowa (Query) — szybka, zoptymalizowana pod przeglądanie. Obsługa wypożyczeń (Command) — wolniejsza, ale gwarantuje spójność. Osobne "systemy" dla osobnych potrzeb.</div>`,
code:`<div class="code-label">Command Handler i Query Handler — rozdzielone przepływy</div>
<pre><span class="c-cmt">// COMMAND — zmiana stanu przez Aggregate</span>
<span class="c-kw">public record</span> <span class="c-type">PlaceOrderCommand</span>(
    <span class="c-type">CustomerId</span> customerId, <span class="c-type">List&lt;OrderLineDto&gt;</span> lines) {}

<span class="c-ann">@Component</span>
<span class="c-kw">public class</span> <span class="c-type">PlaceOrderHandler</span> {
    <span class="c-ann">@Transactional</span>
    <span class="c-kw">public</span> <span class="c-type">OrderId</span> <span class="c-fn">handle</span>(<span class="c-type">PlaceOrderCommand</span> cmd) {
        <span class="c-type">Order</span> order = <span class="c-type">Order</span>.<span class="c-fn">createDraft</span>(cmd.<span class="c-fn">customerId</span>(), clock);
        cmd.<span class="c-fn">lines</span>().<span class="c-fn">forEach</span>(l -> order.<span class="c-fn">addItem</span>(l.<span class="c-fn">productId</span>(), l.<span class="c-fn">qty</span>(), l.<span class="c-fn">price</span>()));
        order.<span class="c-fn">place</span>();
        orderRepo.<span class="c-fn">save</span>(order);
        <span class="c-kw">return</span> order.<span class="c-fn">getId</span>();   <span class="c-cmt">// zwracamy tylko ID!</span>
    }
}

<span class="c-cmt">// QUERY — płaskie DTO, bezpośredni SQL (bez Aggregate)</span>
<span class="c-kw">public record</span> <span class="c-type">OrderSummaryDto</span>(
    <span class="c-type">String</span> id, <span class="c-type">String</span> status, <span class="c-type">BigDecimal</span> total,
    <span class="c-type">String</span> customerName, <span class="c-type">int</span> itemCount) {}

<span class="c-ann">@Component</span>
<span class="c-kw">public class</span> <span class="c-type">GetOrderSummaryHandler</span> {
    <span class="c-kw">public</span> <span class="c-type">OrderSummaryDto</span> <span class="c-fn">handle</span>(<span class="c-type">GetOrderSummaryQuery</span> q) {
        <span class="c-cmt">// Pomijamy Aggregate — prosto do BD</span>
        <span class="c-kw">return</span> jdbc.<span class="c-fn">queryForObject</span>(<span class="c-str">"""
            SELECT o.id, o.status, o.total_amount,
                   c.name AS customer_name,
                   COUNT(oi.id) AS item_count
            FROM orders o
            JOIN customers c ON c.id = o.customer_id
            JOIN order_items oi ON oi.order_id = o.id
            WHERE o.id = ?
            GROUP BY o.id, c.name"""</span>,
            <span class="c-type">ORDER_SUMMARY_MAPPER</span>, q.<span class="c-fn">orderId</span>()
        );
    }
}</pre>`,
interview:[
{q:'Czym jest CQRS i jakie przynosi korzyści?',a:'CQRS rozdziela model zapisu (Command, Aggregate) od modelu odczytu (Query, projekcje). Korzyści: (1) Optymalizacja — write side bogaty w logikę domenową, read side zoptymalizowany pod UI (denormalizowany, szybki SELECT). (2) Skalowalność — możesz skalować read i write niezależnie. (3) Prostota odczytu — query handler to often tylko jedno SQL bez przechodzenia przez agregaty.'},
{q:'CQS a CQRS — czym się różnią?',a:'CQS (Command-Query Separation) to zasada na poziomie metod: metoda albo zmienia stan, albo zwraca dane, nigdy oba naraz. CQRS to wzorzec architektoniczny stosujący tę zasadę na poziomie całych przepływów — osobny model, osobne klasy, często osobne bazy dla zapisu i odczytu. CQS to reguła projektowania kodu, CQRS to styl architektury systemu.'},
]},

{id:'cqrs-readmodel',topic:'cqrs',sub:'read model',title:'Read Model i projekcje',difficulty:'★★★',
teaser:'Denormalizowana tabela/widok zoptymalizowany pod konkretny ekran UI. Aktualizowana asynchronicznie przez zdarzenia.',
def:`<div class="def-block">W zaawansowanym CQRS <strong>read model</strong> to osobna, denormalizowana projekcja danych — np. tabela SQL, widok zmaterializowany, Redis lub Elasticsearch. Aktualizowana asynchronicznie przez Domain Events lub Change Data Capture.</div>
<div class="steps">
<div class="step"><div class="step-num sn-o">C</div><div class="step-body"><div class="step-title">Command → Write Model (Aggregate)</div>Transakcja na write side. Zdarzenie zapisane i opublikowane po commicie.</div></div>
<div class="step"><div class="step-num sn-p">P</div><div class="step-body"><div class="step-title">Projektor aktualizuje Read Model</div>Handler zdarzenia (async) aktualizuje denormalizowaną tabelę — gotową do szybkiego SELECT.</div></div>
<div class="step"><div class="step-num sn-g">Q</div><div class="step-body"><div class="step-title">Query trafia do Read Model</div>Proste SELECT na widoku. Zero Aggregate, zero JOIN-ów, milisekundy.</div></div>
</div>
<div class="warn-block"><div class="warn-label">Eventual Consistency</div>Między zapisem a aktualizacją read modelu jest krótkie opóźnienie. Użytkownik może przez chwilę widzieć stary stan. Trade-off za wydajność — komunikuj to w UI ("odświeżanie...").</div>`,
code:`<div class="code-label">Projektor + Read Model + Rebuild</div>
<pre><span class="c-cmt">// Read model — płaska tabela dla widoku "lista zamówień"</span>
<span class="c-op">CREATE TABLE</span> order_list_view (
    id            <span class="c-type">UUID</span> <span class="c-op">PRIMARY KEY</span>,
    status        <span class="c-type">TEXT</span>,
    total_amount  <span class="c-type">NUMERIC</span>(<span class="c-num">12</span>,<span class="c-num">2</span>),
    customer_name <span class="c-type">TEXT</span>,       <span class="c-cmt">-- denormalizacja: nie JOIN</span>
    item_count    <span class="c-type">INT</span>,
    placed_at     <span class="c-type">TIMESTAMPTZ</span>
);

<span class="c-cmt">// Projektor — aktualizuje widok na podstawie zdarzeń</span>
<span class="c-ann">@EventHandler</span>
<span class="c-kw">public void</span> <span class="c-fn">on</span>(<span class="c-type">OrderPlaced</span> e) {
    jdbc.<span class="c-fn">update</span>(<span class="c-str">"INSERT INTO order_list_view VALUES(?,?,?,?,?,?)"</span>,
        e.<span class="c-fn">orderId</span>(), <span class="c-str">"PLACED"</span>, e.<span class="c-fn">total</span>().<span class="c-fn">amount</span>(),
        <span class="c-fn">fetchName</span>(e.<span class="c-fn">customerId</span>()), e.<span class="c-fn">lineCount</span>(), e.<span class="c-fn">placedAt</span>());
}

<span class="c-ann">@EventHandler</span>
<span class="c-kw">public void</span> <span class="c-fn">on</span>(<span class="c-type">OrderShipped</span> e) {
    jdbc.<span class="c-fn">update</span>(<span class="c-str">"UPDATE order_list_view SET status='SHIPPED' WHERE id=?"</span>,
        e.<span class="c-fn">orderId</span>());
}

<span class="c-cmt">// Rebuild — odtworzenie widoku z historii zdarzeń (np. po migracji)</span>
<span class="c-kw">public void</span> <span class="c-fn">rebuildProjection</span>() {
    jdbc.<span class="c-fn">execute</span>(<span class="c-str">"TRUNCATE order_list_view"</span>);
    eventStore.<span class="c-fn">streamAll</span>(<span class="c-type">OrderPlaced</span>.class).<span class="c-fn">forEach</span>(<span class="c-kw">this</span>::<span class="c-fn">on</span>);
    eventStore.<span class="c-fn">streamAll</span>(<span class="c-type">OrderShipped</span>.class).<span class="c-fn">forEach</span>(<span class="c-kw">this</span>::<span class="c-fn">on</span>);
    <span class="c-cmt">// ... pozostałe zdarzenia</span>
}</pre>`,
interview:[
{q:'Co to jest read model w CQRS i dlaczego jest denormalizowany?',a:'Read model to projekcja danych zoptymalizowana pod konkretny widok UI — np. "lista zamówień" z nazwą klienta i liczbą pozycji. Zamiast trzymać normalizowaną strukturę i robić JOIN-y przy każdym odczycie, denormalizujemy (kopiujemy nazwę klienta do tabeli zamówień). Aktualizujemy asynchronicznie przez zdarzenia. Efekt: zapytania to proste SELECT na jednej tabeli — milisekundy latencji.'},
]},

/* ════════════════════════════════════════════ EVENT SOURCING ════════════════════════════════════════════ */
{id:'es-basics',topic:'es',sub:'podstawy',title:'Event Sourcing — fundamenty',difficulty:'★★★',
teaser:'Stan = suma zdarzeń. Zamiast aktualnego rekordu przechowujesz historię. Replay = odtworzenie stanu.',
def:`<div class="def-block"><strong>Event Sourcing</strong> — wzorzec, w którym stan systemu nie jest przechowywany jako aktualny rekord, ale jako <strong>sekwencja niezmiennych zdarzeń</strong>. Stan jest obliczany przez zastosowanie (replay) wszystkich zdarzeń od początku.</div>
<div class="analogy-block"><div class="analogy-label">Analogia</div>Rachunek bankowy. Bank nie przechowuje "saldo = 1500 PLN". Przechowuje każdą transakcję: wpłata 2000, wypłata 500. Saldo to suma transakcji. Możesz obliczyć stan konta na dowolny dzień. Możesz cofnąć błędną transakcję (kompensacja).</div>
<ul class="key-points">
<li><strong>Event Store</strong>: tylko append (no UPDATE, no DELETE), zdarzenia niezmienne</li>
<li><strong>Replay</strong>: odtworzenie stanu przez sekwencyjne zastosowanie zdarzeń</li>
<li><strong>Snapshot</strong>: zapis stanu po N zdarzeniach — optymalizacja replayu</li>
<li>Pełny audit log za darmo — każda zmiana stanu ma swoje zdarzenie</li>
<li>Time Travel — odtworzenie stanu systemu na dowolny moment w przeszłości</li>
<li>Podstawa dla CQRS projekcji — projekcje budujemy z tych samych zdarzeń</li>
</ul>`,
code:`<div class="code-label">Aggregate z Event Sourcingiem — apply pattern</div>
<pre><span class="c-kw">public class</span> <span class="c-type">BankAccount</span> {
    <span class="c-kw">private</span> <span class="c-type">AccountId</span>   id;
    <span class="c-kw">private</span> <span class="c-type">BigDecimal</span>  balance = <span class="c-type">BigDecimal</span>.ZERO;
    <span class="c-kw">private</span> <span class="c-type">AccountStatus</span> status;
    <span class="c-kw">private final</span> <span class="c-type">List</span>&lt;<span class="c-type">AccountEvent</span>&gt; pending = <span class="c-kw">new</span> <span class="c-type">ArrayList</span>&lt;&gt;();

    <span class="c-cmt">// Komenda — waliduje, potem emituje zdarzenie</span>
    <span class="c-kw">public void</span> <span class="c-fn">deposit</span>(<span class="c-type">BigDecimal</span> amount) {
        <span class="c-kw">if</span> (status != <span class="c-type">ACTIVE</span>) <span class="c-kw">throw new</span> <span class="c-type">AccountNotActiveException</span>();
        <span class="c-kw">if</span> (amount.<span class="c-fn">signum</span>() &lt;= <span class="c-num">0</span>) <span class="c-kw">throw new</span> <span class="c-type">InvalidAmountException</span>();
        <span class="c-fn">applyAndRecord</span>(<span class="c-kw">new</span> <span class="c-type">MoneyDeposited</span>(id, amount, <span class="c-type">Instant</span>.<span class="c-fn">now</span>()));
    }

    <span class="c-cmt">// Apply — zmienia stan BEZ walidacji (używany też przy replay)</span>
    <span class="c-kw">private void</span> <span class="c-fn">apply</span>(<span class="c-type">MoneyDeposited</span> e) {
        balance = balance.<span class="c-fn">add</span>(e.<span class="c-fn">amount</span>());
    }
    <span class="c-kw">private void</span> <span class="c-fn">apply</span>(<span class="c-type">MoneyWithdrawn</span> e) {
        balance = balance.<span class="c-fn">subtract</span>(e.<span class="c-fn">amount</span>());
    }

    <span class="c-cmt">// Odtworzenie z historii zdarzeń</span>
    <span class="c-kw">public static</span> <span class="c-type">BankAccount</span> <span class="c-fn">reconstitute</span>(<span class="c-type">List</span>&lt;<span class="c-type">AccountEvent</span>&gt; history) {
        <span class="c-type">BankAccount</span> acc = <span class="c-kw">new</span> <span class="c-type">BankAccount</span>();
        history.<span class="c-fn">forEach</span>(e -> {
            <span class="c-kw">if</span> (e <span class="c-kw">instanceof</span> <span class="c-type">MoneyDeposited</span>  d) acc.<span class="c-fn">apply</span>(d);
            <span class="c-kw">else if</span> (e <span class="c-kw">instanceof</span> <span class="c-type">MoneyWithdrawn</span> w) acc.<span class="c-fn">apply</span>(w);
            <span class="c-cmt">// ... pattern matching w Java 21+</span>
        });
        <span class="c-kw">return</span> acc;
    }

    <span class="c-kw">private void</span> <span class="c-fn">applyAndRecord</span>(<span class="c-type">AccountEvent</span> e) {
        <span class="c-cmt">// Rozgałęzienie przez instanceof pattern matching</span>
        <span class="c-kw">if</span> (e <span class="c-kw">instanceof</span> <span class="c-type">MoneyDeposited</span> d) <span class="c-fn">apply</span>(d);
        pending.<span class="c-fn">add</span>(e);
    }
}</pre>`,
interview:[
{q:'Czym jest Event Sourcing i co wnosi względem tradycyjnego CRUD?',a:'ES przechowuje sekwencję niezmiennych zdarzeń zamiast aktualnego stanu. Zyski: (1) Pełny audit log bez extra pracy. (2) Time travel — stan na dowolny moment przez replay. (3) Eventualne projekcje — z tych samych zdarzeń możesz budować różne widoki danych. (4) Naturalny event bus. Koszty: złożoność operacyjna, event versioning (schema evolution), replay może być wolny bez snapshotów, zapytania wymagają projekcji (CQRS).'},
{q:'Co to jest Snapshot w Event Sourcing?',a:'Optymalizacja replayu. Po N zdarzeniach zapisujesz aktualny stan agregatu (snapshot). Przy następnym odtworzeniu ładujesz ostatni snapshot i replayu jedynie zdarzeń po nim. Bez snapshotów konto z historią 10 000 transakcji wymaga replayu wszystkich. Z snapshotem co 100 zdarzeń — max 100 zdarzeń do replayu. Trade-off: dodatkowa złożoność kodu i przechowywania.'},
]},

{id:'es-store',topic:'es',sub:'implementacja',title:'Event Store — schemat i wzorce',difficulty:'★★★',
teaser:'Append-only tabela, optimistic locking przez version, stream per aggregate. Jak zaimplementować persystencję zdarzeń.',
def:`<div class="def-block">Event Store to specjalna baza danych lub tabela do przechowywania zdarzeń. Kluczowe właściwości: <strong>append-only</strong> (tylko INSERT, zero UPDATE/DELETE), <strong>stream per aggregate</strong> (zdarzenia grupowane po ID agregatu), <strong>wersjonowanie</strong> (każde zdarzenie ma numer wersji — optimistic locking).</div>
<ul class="key-points">
<li>Bazy dedykowane: EventStoreDB (Greg Young), Axon Server</li>
<li>Bazy generyczne: PostgreSQL (tabela event_store), Azure Cosmos DB, DynamoDB</li>
<li>Stream ID = ID agregatu — pozwala efektywnie załadować historię jednego agregatu</li>
<li>Optimistic locking: UNIQUE (stream_id, version) — zapobiega konfliktom równoczesnego zapisu</li>
<li>CDC (Change Data Capture): Debezium może podłączyć Kafka do tabeli event_store</li>
</ul>`,
code:`<div class="code-label">Event Store — schemat SQL i Java implementation</div>
<pre><span class="c-cmt">-- Schemat Event Store (PostgreSQL)</span>
<span class="c-op">CREATE TABLE</span> event_store (
    global_seq  <span class="c-type">BIGSERIAL</span>   <span class="c-op">PRIMARY KEY</span>,   <span class="c-cmt">-- globalny indeks (CDC, subscriptions)</span>
    stream_id   <span class="c-type">UUID</span>        <span class="c-op">NOT NULL</span>,       <span class="c-cmt">-- ID agregatu</span>
    version     <span class="c-type">INT</span>         <span class="c-op">NOT NULL</span>,       <span class="c-cmt">-- wersja w strumieniu</span>
    event_type  <span class="c-type">TEXT</span>        <span class="c-op">NOT NULL</span>,
    payload     <span class="c-type">JSONB</span>       <span class="c-op">NOT NULL</span>,
    metadata    <span class="c-type">JSONB</span>,                      <span class="c-cmt">-- correlation_id, user_id, timestamp</span>
    occurred_at <span class="c-type">TIMESTAMPTZ</span> <span class="c-op">DEFAULT now</span>(),
    <span class="c-op">UNIQUE</span> (stream_id, version)              <span class="c-cmt">-- optimistic locking!</span>
);

<span class="c-cmt">-- Append zdarzeń (wersja 3 dla agregatu)</span>
<span class="c-op">INSERT INTO</span> event_store(stream_id, version, event_type, payload)
<span class="c-op">VALUES</span>
    (<span class="c-str">'order-abc'</span>, <span class="c-num">1</span>, <span class="c-str">'OrderCreated'</span>,   <span class="c-str">'{"customerId":"xyz"}'</span>),
    (<span class="c-str">'order-abc'</span>, <span class="c-num">2</span>, <span class="c-str">'ItemAdded'</span>,       <span class="c-str">'{"productId":"p1","qty":2}'</span>),
    (<span class="c-str">'order-abc'</span>, <span class="c-num">3</span>, <span class="c-str">'OrderConfirmed'</span>,  <span class="c-str">'{"total":150.00}'</span>);

<span class="c-cmt">-- Replay agregatu</span>
<span class="c-op">SELECT</span> event_type, payload
<span class="c-op">FROM</span>   event_store
<span class="c-op">WHERE</span>  stream_id = <span class="c-str">'order-abc'</span>
<span class="c-op">ORDER BY</span> version <span class="c-op">ASC</span>;

<span class="c-cmt">-- Optymistic locking: INSERT z version=3 gdy istnieje version=3 → UniqueViolation!</span></pre>`,
interview:[
{q:'Jak zapobiegasz konfliktom równoczesnego zapisu w Event Store?',a:'Optimistic locking przez UNIQUE constraint na (stream_id, version). Przy zapisie podajesz expectedVersion. Jeśli inny wątek zdążył zapisać tę samą wersję — constraint narusza się i dostajesz ConcurrencyException. Wtedy reload agregatu z nową wersją i retry. To bezpieczniejsze niż pesymistyczne blokowanie (deadlock-free) i sprawdza się przy niskiej kolizyjności.'},
]},

/* ════════════════════════════════════════════ EDD ════════════════════════════════════════════ */
{id:'edd-basics',topic:'edd',sub:'podstawy',title:'Event-Driven Architecture',difficulty:'★★☆',
teaser:'Komponenty komunikują się przez zdarzenia. Producer nie zna konsumentów. Luźne powiązanie, asynchroniczność.',
def:`<div class="def-block"><strong>Event-Driven Architecture (EDA)</strong> to styl architektoniczny, w którym komponenty systemu komunikują się asynchronicznie przez <strong>zdarzenia</strong> za pośrednictwem message brokera. Producent emituje zdarzenie nie wiedząc kto i czy w ogóle ktoś zareaguje.</div>
<table class="ctable">
<tr><th>Styl komunikacji</th><th>Coupling</th><th>Timing</th><th>Odpowiedź</th></tr>
<tr><td>REST / gRPC</td><td class="no">Tight</td><td>Sync</td><td class="yes">Natychmiastowa</td></tr>
<tr><td>Message Queue</td><td class="yes">Loose</td><td>Async</td><td class="no">Eventual</td></tr>
<tr><td>Event Streaming (Kafka)</td><td class="yes">Loose</td><td>Async</td><td class="no">Eventual</td></tr>
</table>
<ul class="key-points">
<li><strong>Message Queue</strong> (RabbitMQ, SQS): jeden konsument per wiadomość, competing consumers</li>
<li><strong>Event Streaming</strong> (Kafka): każdy konsument czyta niezależnie, log retention, replay</li>
<li><strong>Fan-out</strong>: jedno zdarzenie → wiele niezależnych konsumentów</li>
<li>Dodanie nowego konsumenta = zero zmian u producenta</li>
</ul>`,
code:`<div class="code-label">Producent i konsumenci — zero bezpośredniego powiązania</div>
<pre><span class="c-cmt">// PRODUCENT — OrderService nie importuje InvoiceService!</span>
<span class="c-ann">@Service</span>
<span class="c-kw">public class</span> <span class="c-type">OrderService</span> {
    <span class="c-ann">@Transactional</span>
    <span class="c-kw">public</span> <span class="c-type">OrderId</span> <span class="c-fn">place</span>(<span class="c-type">PlaceOrderCommand</span> cmd) {
        <span class="c-type">Order</span> order = <span class="c-type">Order</span>.<span class="c-fn">createDraft</span>(cmd.<span class="c-fn">customerId</span>(), clock);
        <span class="c-cmt">// ... logika</span>
        orderRepo.<span class="c-fn">save</span>(order);
        <span class="c-cmt">// Emitujemy zdarzenie — NIE wywołujemy invoiceService.create()</span>
        publisher.<span class="c-fn">publish</span>(<span class="c-kw">new</span> <span class="c-type">OrderPlaced</span>(order.<span class="c-fn">getId</span>(), order.<span class="c-fn">getTotal</span>()));
        <span class="c-kw">return</span> order.<span class="c-fn">getId</span>();
    }
}

<span class="c-cmt">// KONSUMENT #1 — fakturowanie (osobny serwis)</span>
<span class="c-ann">@KafkaListener</span>(topics = <span class="c-str">"orders.placed"</span>, groupId = <span class="c-str">"invoicing"</span>)
<span class="c-kw">public void</span> <span class="c-fn">onOrderPlaced</span>(<span class="c-type">OrderPlaced</span> event) {
    invoiceService.<span class="c-fn">createInvoice</span>(event.<span class="c-fn">orderId</span>(), event.<span class="c-fn">total</span>());
}

<span class="c-cmt">// KONSUMENT #2 — notyfikacje (inny serwis, inny group_id!)</span>
<span class="c-ann">@KafkaListener</span>(topics = <span class="c-str">"orders.placed"</span>, groupId = <span class="c-str">"notifications"</span>)
<span class="c-kw">public void</span> <span class="c-fn">onOrderPlaced</span>(<span class="c-type">OrderPlaced</span> event) {
    emailService.<span class="c-fn">sendConfirmation</span>(event.<span class="c-fn">orderId</span>());
}
<span class="c-cmt">// OrderService nie wie ani o InvoiceService, ani o EmailService</span></pre>`,
interview:[
{q:'Czym jest Event-Driven Architecture i kiedy jej używać?',a:'EDA to styl gdzie komponenty komunikują się asynchronicznie przez zdarzenia za pośrednictwem message brokera. Gdy OrderService emituje OrderPlaced, wszystkie zainteresowane serwisy reagują niezależnie. Używam gdy: (1) chcę luźnego powiązania — dodanie nowego konsumenta nie wymaga zmian u producenta, (2) side-effecty mogą być async (faktura, mail, analytics), (3) jeden fakt musi dotrzeć do wielu systemów. Nie używam gdy potrzebuję natychmiastowej odpowiedzi (zapytanie do serwisu, walidacja przed operacją).'},
]},

{id:'edd-outbox',topic:'edd',sub:'wzorce niezawodności',title:'Transactional Outbox i Idempotency',difficulty:'★★★',
teaser:'Outbox: atomowy zapis stanu + zdarzenia w jednej transakcji. Idempotency: bezpieczne przetworzenie zdarzenia wiele razy.',
def:`<div class="def-block"><strong>Dual Write Problem</strong>: nie można atomowo zapisać do bazy I wysłać do Kafki. Jeśli serwis padnie między tymi operacjami — niespójność. <strong>Transactional Outbox</strong> rozwiązuje to przez zapisanie zdarzenia do tabeli outbox w tej samej transakcji co stan.</div>
<div class="def-block"><strong>Idempotency</strong>: w at-least-once delivery konsument może odebrać to samo zdarzenie wielokrotnie. Idempotentny handler przetwarza je bezpiecznie — wielokrotne wywołanie daje ten sam wynik co jednokrotne.</div>
<ul class="key-points">
<li>Outbox table + Poller = at-least-once delivery (nigdy nie zgubisz zdarzenia)</li>
<li>Debezium (CDC) — alternatywa dla pollera, czyta WAL Postgresa</li>
<li>Idempotency key = event ID — przechowywany w tabeli processed_events</li>
<li>Natural idempotency: INSERT with ON CONFLICT DO NOTHING, UPDATE SET x=x+0 (idempotent)</li>
<li>Saga pattern — koordynacja wielu serwisów z kompensacją przy błędzie</li>
</ul>`,
code:`<div class="code-label">Transactional Outbox + Idempotent Consumer</div>
<pre><span class="c-cmt">-- Tabela outbox — w tej samej BD co stan biznesowy</span>
<span class="c-op">CREATE TABLE</span> outbox (
    id          <span class="c-type">UUID</span> <span class="c-op">PRIMARY KEY</span>,
    topic       <span class="c-type">TEXT</span> <span class="c-op">NOT NULL</span>,
    payload     <span class="c-type">JSONB</span> <span class="c-op">NOT NULL</span>,
    created_at  <span class="c-type">TIMESTAMPTZ</span> <span class="c-op">DEFAULT now</span>(),
    sent_at     <span class="c-type">TIMESTAMPTZ</span>            <span class="c-cmt">-- null = jeszcze niewysłane</span>
);

<span class="c-cmt">// Atomowy zapis stanu + zdarzenia</span>
<span class="c-ann">@Transactional</span>
<span class="c-kw">public void</span> <span class="c-fn">placeOrder</span>(<span class="c-type">PlaceOrderCommand</span> cmd) {
    <span class="c-type">Order</span> order = <span class="c-type">Order</span>.<span class="c-fn">createDraft</span>(cmd.<span class="c-fn">customerId</span>(), clock);
    orderRepo.<span class="c-fn">save</span>(order);                         <span class="c-cmt">// stan</span>

    outboxRepo.<span class="c-fn">save</span>(<span class="c-kw">new</span> <span class="c-type">OutboxMessage</span>(              <span class="c-cmt">// zdarzenie</span>
        <span class="c-type">UUID</span>.<span class="c-fn">randomUUID</span>(), <span class="c-str">"orders.placed"</span>,
        serialize(<span class="c-kw">new</span> <span class="c-type">OrderPlaced</span>(order.<span class="c-fn">getId</span>()))
    ));
    <span class="c-cmt">// Albo oba OK (commit), albo oba rollback. Zero dual write!</span>
}

<span class="c-cmt">// Poller — wysyła zdarzenia z outbox do Kafki (osobny wątek)</span>
<span class="c-ann">@Scheduled</span>(fixedDelay = <span class="c-num">1000</span>)
<span class="c-kw">public void</span> <span class="c-fn">relay</span>() {
    outboxRepo.<span class="c-fn">findUnsent</span>(<span class="c-fn">limit</span>(<span class="c-num">100</span>)).<span class="c-fn">forEach</span>(msg -> {
        kafka.<span class="c-fn">send</span>(msg.<span class="c-fn">topic</span>(), msg.<span class="c-fn">payload</span>());
        outboxRepo.<span class="c-fn">markSent</span>(msg.<span class="c-fn">id</span>());
    });
}

<span class="c-cmt">// IDEMPOTENT CONSUMER — bezpieczny przy at-least-once</span>
<span class="c-ann">@KafkaListener</span>(topics = <span class="c-str">"orders.placed"</span>)
<span class="c-ann">@Transactional</span>
<span class="c-kw">public void</span> <span class="c-fn">handle</span>(<span class="c-type">OrderPlaced</span> event) {
    <span class="c-kw">if</span> (processedRepo.<span class="c-fn">exists</span>(event.<span class="c-fn">eventId</span>())) {
        <span class="c-kw">return</span>;  <span class="c-cmt">// already processed — skip safely</span>
    }
    invoiceService.<span class="c-fn">createInvoice</span>(event);
    processedRepo.<span class="c-fn">markProcessed</span>(event.<span class="c-fn">eventId</span>());
}</pre>`,
interview:[
{q:'Co to jest Transactional Outbox i jaki problem rozwiązuje?',a:'Rozwiązuje dual write problem — nie można atomowo zapisać do bazy i wysłać wiadomości do Kafki. Rozwiązanie: zapisujesz zdarzenie do tabeli outbox w tej samej transakcji DB co zmianę stanu. Osobny poller (lub Debezium) asynchronicznie wysyła zdarzenia z outbox do brokera. Gwarancja: at-least-once delivery — zdarzenie zostanie wysłane, nawet jeśli serwis padnie po commicie a przed wysłaniem.'},
{q:'Co to znaczy że konsument jest idempotentny?',a:'Idempotentny konsument może przetworzyć to samo zdarzenie wielokrotnie z tym samym efektem co jednokrotne przetworzenie. Ważne w at-least-once delivery — broker może dostarczyć duplikaty. Implementacja: sprawdź czy event_id był już przetworzony (tabela processed_events), jeśli tak — skip. Alternatywy: natural idempotency (INSERT ON CONFLICT DO NOTHING, deduplikacja po kluczu biznesowym).'},
]},

{id:'edd-saga',topic:'edd',sub:'wzorce niezawodności',title:'Saga — długie transakcje',difficulty:'★★★',
teaser:'Zastępuje distributed transactions. Sekwencja lokalnych transakcji z kompensacją przy błędzie.',
def:`<div class="def-block"><strong>Saga</strong> to wzorzec zarządzania długim procesem biznesowym angażującym wiele serwisów, gdzie każdy krok to osobna lokalna transakcja z możliwością kompensacji (rollbacku) w razie błędu.</div>
<div class="steps">
<div class="step"><div class="step-num sn-g">Ch</div><div class="step-body"><div class="step-title">Choreography Saga</div>Każdy serwis reaguje na zdarzenia poprzedniego i emituje własne. Brak centralnego koordynatora. Prosta w implementacji, trudna w debugowaniu dla złożonych procesów.</div></div>
<div class="step"><div class="step-num sn-p">Or</div><div class="step-body"><div class="step-title">Orchestration Saga</div>Centralny orkiestrator (Process Manager) wysyła komendy do serwisów i reaguje na odpowiedzi. Trudniejsza implementacja, łatwiejsze debugowanie.</div></div>
</div>
<div class="warn-block"><div class="warn-label">Saga vs Distributed Transactions (2PC)</div>2-Phase Commit to antywzorzec w mikroserwisach — blokuje zasoby, kruchy, źle skaluje. Saga używa lokalnych transakcji + kompensacji. Trade-off: eventual consistency zamiast strong consistency.</div>`,
code:`<div class="code-label">Choreography Saga — złożenie zamówienia</div>
<pre><span class="c-cmt">// Przepływ: Order → Payment → Warehouse → Shipping</span>
<span class="c-cmt">// Każdy serwis reaguje na zdarzenie i emituje swoje</span>

<span class="c-cmt">// 1. OrderService → OrderPlaced</span>
order.<span class="c-fn">place</span>(); publisher.<span class="c-fn">publish</span>(<span class="c-kw">new</span> <span class="c-type">OrderPlaced</span>(orderId, total));

<span class="c-cmt">// 2. PaymentService: OrderPlaced → PaymentProcessed / PaymentFailed</span>
<span class="c-ann">@On</span>(<span class="c-type">OrderPlaced</span>.class)
<span class="c-kw">void</span> <span class="c-fn">processPayment</span>(<span class="c-type">OrderPlaced</span> e) {
    <span class="c-kw">try</span> {
        payment.<span class="c-fn">charge</span>(e.<span class="c-fn">total</span>());
        publisher.<span class="c-fn">publish</span>(<span class="c-kw">new</span> <span class="c-type">PaymentProcessed</span>(e.<span class="c-fn">orderId</span>()));
    } <span class="c-kw">catch</span> (<span class="c-type">PaymentException</span> ex) {
        publisher.<span class="c-fn">publish</span>(<span class="c-kw">new</span> <span class="c-type">PaymentFailed</span>(e.<span class="c-fn">orderId</span>(), ex.<span class="c-fn">reason</span>()));
    }
}

<span class="c-cmt">// 3. OrderService: PaymentFailed → KOMPENSACJA (cancel order)</span>
<span class="c-ann">@On</span>(<span class="c-type">PaymentFailed</span>.class)
<span class="c-kw">void</span> <span class="c-fn">compensate</span>(<span class="c-type">PaymentFailed</span> e) {
    <span class="c-type">Order</span> order = repo.<span class="c-fn">findById</span>(e.<span class="c-fn">orderId</span>());
    order.<span class="c-fn">cancelDueToPaymentFailure</span>(e.<span class="c-fn">reason</span>());
    repo.<span class="c-fn">save</span>(order);
    <span class="c-cmt">// Kompensacja może też powiadomić klienta itd.</span>
}

<span class="c-cmt">// Orchestration — centralny Process Manager</span>
<span class="c-kw">public class</span> <span class="c-type">OrderFulfillmentSaga</span> {
    <span class="c-kw">void</span> <span class="c-fn">start</span>(<span class="c-type">OrderId</span> id) { paymentSvc.<span class="c-fn">process</span>(id); }

    <span class="c-ann">@On</span>(<span class="c-type">PaymentProcessed</span>.class)
    <span class="c-kw">void</span> <span class="c-fn">step2</span>(<span class="c-type">PaymentProcessed</span> e) { warehouseSvc.<span class="c-fn">reserve</span>(e.<span class="c-fn">orderId</span>()); }

    <span class="c-ann">@On</span>(<span class="c-type">StockReserved</span>.class)
    <span class="c-kw">void</span> <span class="c-fn">step3</span>(<span class="c-type">StockReserved</span> e)    { shippingSvc.<span class="c-fn">schedule</span>(e.<span class="c-fn">orderId</span>()); }

    <span class="c-ann">@On</span>(<span class="c-type">StockUnavailable</span>.class)
    <span class="c-kw">void</span> <span class="c-fn">compensate</span>(<span class="c-type">StockUnavailable</span> e) { paymentSvc.<span class="c-fn">refund</span>(e.<span class="c-fn">orderId</span>()); }
}</pre>`,
interview:[
{q:'Co to jest Saga i czym różni się Choreography od Orchestration?',a:'Saga to wzorzec dla długich procesów biznesowych angażujących wiele serwisów. Choreography: każdy serwis reaguje na zdarzenia i emituje własne — brak centralnego koordynatora, prosta implementacja ale trudna w debugowaniu i śledzeniu przepływu. Orchestration: centralny Process Manager wysyła komendy i reaguje na odpowiedzi — łatwiejsze debugowanie, jeden punkt kontroli, ale single point of failure i trudniejsza implementacja.'},
]},
];

/* ════════════════ State ════════════════ */
const KEY = 'senior_dev_fc_v2';
let learned = new Set(JSON.parse(localStorage.getItem(KEY)||'[]'));
let topic = 'all';
let sub   = 'all';
let cid   = null;

const save = () => localStorage.setItem(KEY, JSON.stringify([...learned]));

function filtered() {
  return CARDS.filter(c =>
    (topic==='all' || c.topic===topic) &&
    (sub==='all'   || c.sub===sub)
  );
}

/* ════════════════ Render ════════════════ */
function updateStats() {
  const t = CARDS.length, d = learned.size;
  document.getElementById('sb-learned').textContent = `${d} / ${t}`;
  document.getElementById('sb-fill').style.width = `${(d/t)*100}%`;
}

function renderSubs() {
  const wrap = document.getElementById('sub-wrap');
  if (topic==='all') { wrap.innerHTML=''; return; }
  const subs = [...new Set(CARDS.filter(c=>c.topic===topic).map(c=>c.sub))];
  wrap.innerHTML = ['all',...subs].map(s => `
    <button class="sub-btn ${sub===s?'active':''}" data-sub="${s}">
      ${s==='all'?'wszystkie':s}
    </button>`).join('');
  wrap.querySelectorAll('.sub-btn').forEach(b => b.addEventListener('click', () => {
    sub = b.dataset.sub; renderSubs(); renderGrid();
  }));
}

const ACCENT = {ddd:' var(--a-ddd)',tdd:' var(--a-tdd)',bdd:' var(--a-bdd)',cqrs:' var(--a-cqrs)',es:' var(--a-es)',edd:' var(--a-edd)'};
const LABEL  = {ddd:'DDD',tdd:'TDD',bdd:'BDD',cqrs:'CQRS',es:'Event Sourcing',edd:'Event-Driven'};
const TITLE  = {all:'DDD · TDD · BDD · CQRS · ES · EDD',ddd:'Domain-Driven Design',tdd:'Test-Driven Development',bdd:'Behaviour-Driven Development',cqrs:'CQRS',es:'Event Sourcing',edd:'Event-Driven Architecture'};

function renderGrid() {
  const f = filtered();
  document.getElementById('topic-label').textContent = LABEL[topic]||'Wszystkie tematy';
  document.getElementById('main-title').textContent = TITLE[topic]||'DDD · TDD · BDD · CQRS · ES · EDD';
  const grid = document.getElementById('grid');
  if (!f.length) { grid.innerHTML='<div class="empty">Brak kart.</div>'; return; }
  grid.innerHTML = f.map(c => `
    <div class="card ${learned.has(c.id)?'learned':''}"
         style="--card-accent:${ACCENT[c.topic]||'#888'}"
         onclick="openCard('${c.id}')">
      <div class="card-top">
        <div class="card-meta">
          <span class="tag tag-${c.topic}">${LABEL[c.topic]||c.topic} · ${c.sub}</span>
          <span class="difficulty">${c.difficulty}</span>
        </div>
        <div class="card-title">${c.title}</div>
        <div class="card-teaser">${c.teaser}</div>
      </div>
      <div class="card-footer">
        <div class="card-status">
          <span class="status-dot"></span>
          ${learned.has(c.id)?'Opanowane':'Do nauki'}
        </div>
        <span class="card-hint">kliknij →</span>
      </div>
    </div>`).join('');
}

/* ════════════════ Modal ════════════════ */
function openCard(id) {
  const c = CARDS.find(x=>x.id===id); if (!c) return;
  cid = id;
  const accent = ACCENT[c.topic]||'var(--a-ddd)';
  document.getElementById('modal').style.setProperty('--modal-accent', accent.trim());
  document.getElementById('modal-tag').innerHTML =
    `<span class="tag tag-${c.topic}" style="font-size:10px">${LABEL[c.topic]} · ${c.sub}</span>`;
  document.getElementById('modal-title').textContent = c.title;
  document.getElementById('panel-def').innerHTML = c.def||'';
  document.getElementById('panel-code').innerHTML = c.code||'<p style="color:var(--muted);padding:16px 0;font-size:13px">Brak przykładu kodu.</p>';
  document.getElementById('panel-interview').innerHTML = renderIQ(c.interview||[]);
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab==='def'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-def'));
  updateLearnedBtn(id);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal').querySelector('.modal-body').scrollTop = 0;
}

function renderIQ(qs) {
  if (!qs.length) return '<p style="color:var(--muted);font-size:14px;padding:16px 0">Brak pytań.</p>';
  return qs.map((q,i)=>`
    <div class="iq">
      <div class="iq-q">Q: ${q.q}</div>
      <div class="iq-a" id="iq-${i}">${q.a}</div>
      <button class="iq-btn" onclick="toggleIQ(${i})">▶ Pokaż odpowiedź</button>
    </div>`).join('');
}

function toggleIQ(i) {
  const el = document.getElementById(`iq-${i}`);
  const open = el.classList.toggle('open');
  el.nextElementSibling.textContent = open ? '▼ Ukryj' : '▶ Pokaż odpowiedź';
}

function updateLearnedBtn(id) {
  const btn = document.getElementById('btn-learned');
  const is = learned.has(id);
  btn.textContent = is ? '✓ Opanowane' : '○ Oznacz opanowane';
  btn.classList.toggle('is-learned', is);
}

/* ════════════════ Events ════════════════ */
document.getElementById('btn-learned').addEventListener('click', () => {
  if (!cid) return;
  learned.has(cid) ? learned.delete(cid) : learned.add(cid);
  save(); updateLearnedBtn(cid); updateStats(); renderGrid();
});

function navigate(dir) {
  const f = filtered(), i = f.findIndex(c=>c.id===cid);
  if (i===-1) return;
  openCard(f[(i+dir+f.length)%f.length].id);
}
document.getElementById('btn-prev').addEventListener('click', ()=>navigate(-1));
document.getElementById('btn-next').addEventListener('click', ()=>navigate(1));

document.getElementById('modal-close').addEventListener('click', ()=>document.getElementById('overlay').classList.remove('open'));
document.getElementById('overlay').addEventListener('click', e=>{
  if(e.target===e.currentTarget) document.getElementById('overlay').classList.remove('open');
});

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', ()=>{
  const tab = t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id===`panel-${tab}`));
}));

document.querySelectorAll('.topic-item').forEach(btn => btn.addEventListener('click', ()=>{
  topic = btn.dataset.topic; sub = 'all';
  document.querySelectorAll('.topic-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSubs(); renderGrid();
  closeSidebar();
}));

document.addEventListener('keydown', e=>{
  if (e.key==='Escape') document.getElementById('overlay').classList.remove('open');
  if (e.key==='ArrowRight'&&cid) navigate(1);
  if (e.key==='ArrowLeft'&&cid)  navigate(-1);
});

/* ════════════════ Theme ════════════════ */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const label = document.getElementById('theme-label');
  if (label) label.textContent = t==='dark' ? 'Tryb jasny' : 'Tryb ciemny';
  localStorage.setItem('fc_theme', t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
}
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
document.getElementById('theme-toggle-mobile')?.addEventListener('click', toggleTheme);

const savedTheme = localStorage.getItem('fc_theme');
if (savedTheme) applyTheme(savedTheme);

/* ════════════════ Mobile sidebar ════════════════ */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-backdrop').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('visible');
  document.body.style.overflow = '';
}
document.getElementById('mobile-menu')?.addEventListener('click', ()=>{
  const isOpen = document.getElementById('sidebar').classList.contains('open');
  isOpen ? closeSidebar() : openSidebar();
});
document.getElementById('sidebar-backdrop')?.addEventListener('click', closeSidebar);

/* Update mobile title when topic changes */
const origRenderGrid = renderGrid;

/* ════════════════ Init ════════════════ */
updateStats(); renderSubs(); renderGrid();
</script>
</body>
</html>
