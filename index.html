<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiszki — DDD · TDD · BDD · CQRS · ES · EDD</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Themes ── */
[data-theme="dark"] {
  --bg:        #0d0d0f;
  --surface:   #16161a;
  --surface2:  #1e1e24;
  --surface3:  #26262e;
  --border:    #2a2a35;
  --border2:   #3a3a48;
  --text:      #e8e6f0;
  --text2:     #b8b6c8;
  --muted:     #7a7890;
  --code-bg:   #0a0a10;
  --shadow:    rgba(0,0,0,.5);
  --toggle-bg: #2a2a35;
}
[data-theme="light"] {
  --bg:        #f4f3f7;
  --surface:   #ffffff;
  --surface2:  #f0eef8;
  --surface3:  #e8e5f2;
  --border:    #d8d4e8;
  --border2:   #c8c3dc;
  --text:      #1a1828;
  --text2:     #3d3a54;
  --muted:     #8a85a8;
  --code-bg:   #1a1828;
  --shadow:    rgba(0,0,0,.12);
  --toggle-bg: #d8d4e8;
}
/* ── Accent palette (same both themes) ── */
:root {
  --a-ddd:  #7c6af7;
  --a-tdd:  #4fc4a0;
  --a-bdd:  #4aa8f0;
  --a-cqrs: #f0834d;
  --a-es:   #e05c9a;
  --a-edd:  #e8c84a;
  --green:  #4fc4a0;
  --red:    #f07070;
  --mono:   'JetBrains Mono', monospace;
  --sans:   'Inter', system-ui, sans-serif;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; transition: background .25s, color .25s; font-size: 15px; line-height: 1.6; }

/* ── Layout ── */
.shell { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 230px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; z-index: 20;
  transition: background .25s, border-color .25s, transform .25s;
}
.main { flex: 1; min-width: 0; padding: 32px 32px 80px; }

/* Sidebar header — just the topic count, no branding */
.sb-header { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
.sb-app-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.2px; }
.sb-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }

.sb-section { padding: 16px 18px 6px; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }

.topic-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--muted);
  border: none; background: transparent; width: 100%;
  text-align: left; transition: color .15s, background .15s;
  border-left: 3px solid transparent;
}
.topic-item:hover { color: var(--text); background: var(--surface2); }
.topic-item.active { color: var(--text); border-left-color: var(--topic-accent, var(--a-ddd)); background: var(--surface2); font-weight: 600; }
.topic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--topic-accent, var(--muted)); opacity: .6; }
.topic-item.active .topic-dot { opacity: 1; }

.sb-stats { padding: 14px 18px; border-top: 1px solid var(--border); margin-top: auto; }
.sb-stat-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.sb-stat-val { font-family: var(--mono); color: var(--text2); font-weight: 500; font-size: 12px; }
.sb-progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.sb-progress-fill { height: 100%; background: linear-gradient(90deg, var(--a-ddd), var(--a-tdd)); border-radius: 2px; transition: width .4s; }

/* Theme toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; cursor: pointer; border: none;
  background: transparent; color: var(--muted);
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  border-top: 1px solid var(--border); width: 100%;
  transition: color .15s;
}
.theme-toggle:hover { color: var(--text); }
.toggle-track {
  width: 34px; height: 19px; border-radius: 10px;
  background: var(--toggle-bg); position: relative;
  border: 1px solid var(--border2); transition: background .2s;
  flex-shrink: 0;
}
.toggle-knob {
  position: absolute; top: 3px; left: 3px;
  width: 11px; height: 11px; border-radius: 50%;
  background: var(--muted); transition: transform .2s, background .2s;
}
[data-theme="light"] .toggle-knob { transform: translateX(15px); background: var(--a-ddd); }

/* Main header */
.main-header { margin-bottom: 24px; }
.main-title { font-size: clamp(20px, 3vw, 28px); font-weight: 700; letter-spacing: -.4px; line-height: 1.15; color: var(--text); }
.main-topic-label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: .3px; text-transform: uppercase; margin-bottom: 6px; }

/* Sub filters */
.sub-wrap { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; min-height: 0; }
.sub-btn {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.sub-btn:hover { color: var(--text); border-color: var(--border2); }
.sub-btn.active { background: var(--surface2); border-color: var(--border2); color: var(--text); font-weight: 600; }

/* Card grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer;
  transition: transform .18s, border-color .18s, box-shadow .18s, background .25s;
  display: flex; flex-direction: column; overflow: hidden;
}
.card:hover {
  transform: translateY(-3px);
  border-color: var(--card-accent, var(--a-ddd));
  box-shadow: 0 8px 32px var(--shadow);
}
.card-top { padding: 20px 20px 14px; flex: 1; }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.tag { font-family: var(--mono); font-size: 10px; letter-spacing: .5px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
.difficulty { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.card-title { font-size: 16px; font-weight: 650; line-height: 1.3; margin-bottom: 8px; color: var(--text); letter-spacing: -.1px; }
.card-teaser { font-size: 13px; color: var(--muted); line-height: 1.6; }
.card-footer { padding: 10px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.card-status { font-family: var(--mono); font-size: 11px; display: flex; align-items: center; gap: 6px; color: var(--muted); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
.card.learned .status-dot { background: var(--green); }
.card.learned { border-color: rgba(79,196,160,.35); }
.card-hint { font-size: 11px; color: var(--muted); font-family: var(--mono); }

/* Tag colors */
.tag-ddd  { background: rgba(124,106,247,.15); color: var(--a-ddd); }
.tag-tdd  { background: rgba(79,196,160,.15);  color: var(--a-tdd); }
.tag-bdd  { background: rgba(74,168,240,.15);  color: var(--a-bdd); }
.tag-cqrs { background: rgba(240,131,77,.15);  color: var(--a-cqrs); }
.tag-es   { background: rgba(224,92,154,.15);  color: var(--a-es); }
.tag-edd  { background: rgba(232,200,74,.15);  color: var(--a-edd); }

/* Modal overlay */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: flex-start; justify-content: center; padding: 24px 16px 40px; overflow-y: auto; }
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; width: 100%; max-width: 780px;
  animation: slideUp .22s ease; margin: auto;
  transition: background .25s, border-color .25s;
}
@keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.modal-header { padding: 24px 28px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.modal-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; margin-top: 6px; color: var(--text); line-height: 1.25; }
.modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 8px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.modal-close:hover { color: var(--text); border-color: var(--border2); }

.modal-body { padding: 20px 28px 24px; max-height: 70vh; overflow-y: auto; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-track { background: transparent; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 22px; border-bottom: 1px solid var(--border); }
.tab { font-family: var(--sans); font-size: 13px; font-weight: 600; padding: 9px 18px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--modal-accent, var(--a-ddd)); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Content blocks */
.def-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; line-height: 1.7; font-size: 14px; color: var(--text2); }
.def-block strong { color: var(--a-tdd); font-weight: 600; }

.analogy-block { border-left: 3px solid var(--modal-accent, var(--a-ddd)); padding: 12px 16px; background: color-mix(in srgb, var(--modal-accent, var(--a-ddd)) 7%, transparent); border-radius: 0 8px 8px 0; margin-bottom: 16px; font-size: 14px; line-height: 1.7; color: var(--text2); }
.analogy-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--modal-accent, var(--a-ddd)); text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
.warn-block { border-left: 3px solid var(--a-edd); padding: 12px 16px; background: rgba(232,200,74,.07); border-radius: 0 8px 8px 0; margin-bottom: 16px; font-size: 14px; line-height: 1.7; color: var(--text2); }
.warn-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--a-edd); text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
.ok-block { border-left: 3px solid var(--green); padding: 12px 16px; background: rgba(79,196,160,.07); border-radius: 0 8px 8px 0; margin-bottom: 16px; font-size: 14px; line-height: 1.7; color: var(--text2); }
.ok-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--green); text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }

.key-points { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.key-points li { display: flex; gap: 10px; align-items: flex-start; font-size: 14px; line-height: 1.65; color: var(--text2); }
.key-points li::before { content: '→'; color: var(--a-tdd); flex-shrink: 0; margin-top: 2px; font-weight: 600; }

.keyword-pill { display: inline-block; background: rgba(124,106,247,.12); color: var(--a-ddd); border: 1px solid rgba(124,106,247,.2); border-radius: 4px; padding: 2px 7px; font-family: var(--mono); font-size: 12px; margin: 2px; }

.steps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.step { display: flex; gap: 14px; align-items: flex-start; }
.step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; font-family: var(--mono); }
.sn-r { background: rgba(224,92,154,.2); color: var(--a-es); }
.sn-g { background: rgba(79,196,160,.2); color: var(--green); }
.sn-b { background: rgba(74,168,240,.2); color: var(--a-bdd); }
.sn-p { background: rgba(124,106,247,.2); color: var(--a-ddd); }
.sn-o { background: rgba(240,131,77,.2); color: var(--a-cqrs); }
.step-body { font-size: 14px; line-height: 1.65; color: var(--text2); }
.step-title { font-weight: 600; margin-bottom: 3px; color: var(--text); font-size: 14px; }

/* Code */
pre { background: var(--code-bg) !important; border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; overflow-x: auto; margin-bottom: 16px; font-family: var(--mono); font-size: 12.5px; line-height: 1.8; color: #c9d1d9; }
.code-label { font-family: var(--mono); font-size: 10px; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
.c-kw  { color: #c792ea; } .c-str { color: #c3e88d; } .c-type { color: #82aaff; }
.c-fn  { color: #f07178; } .c-cmt { color: #637777; font-style: italic; }
.c-num { color: #f78c6c; } .c-ok  { color: #4fc4a0; } .c-bad { color: #f07070; }
.c-ann { color: #e8c84a; } .c-op  { color: #89ddff; } .c-dec { color: #ffcb6b; }

/* Table */
.ctable { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
.ctable th { background: var(--surface2); padding: 10px 14px; text-align: left; font-weight: 600; color: var(--muted); font-size: 11px; border-bottom: 1px solid var(--border); letter-spacing: .3px; text-transform: uppercase; }
.ctable td { padding: 10px 14px; border-bottom: 1px solid var(--border); line-height: 1.55; vertical-align: top; color: var(--text2); font-size: 13px; }
.ctable tr:last-child td { border-bottom: none; }
.yes { color: var(--green); font-weight: 600; } .no { color: var(--red); font-weight: 600; }

/* Interview */
.iq { background: color-mix(in srgb, var(--modal-accent, var(--a-ddd)) 6%, var(--surface2)); border: 1px solid color-mix(in srgb, var(--modal-accent, var(--a-ddd)) 22%, var(--border)); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
.iq-q { font-size: 13px; font-weight: 600; color: var(--modal-accent, var(--a-ddd)); margin-bottom: 6px; line-height: 1.5; }
.iq-a { font-size: 14px; line-height: 1.7; color: var(--text2); display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.iq-a.open { display: block; }
.iq-btn { font-size: 12px; font-family: var(--mono); color: var(--muted); border: none; background: none; cursor: pointer; padding: 0; margin-top: 8px; transition: color .15s; font-weight: 500; }
.iq-btn:hover { color: var(--modal-accent, var(--a-ddd)); }

/* Modal footer */
.modal-footer { padding: 14px 28px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
.nav-btns { display: flex; gap: 8px; }
.btn { font-family: var(--sans); font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .15s; }
.btn:hover { border-color: var(--border2); color: var(--text); }
.btn-learned { background: transparent; border-color: var(--green); color: var(--green); }
.btn-learned:hover { background: rgba(79,196,160,.1); }
.btn-learned.is-learned { background: rgba(79,196,160,.15); }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }

/* ── Responsive ── */

/* Overlay backdrop for mobile sidebar */
.sidebar-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 15;
}
.sidebar-backdrop.visible { display: block; }

/* Mobile top bar */
.mobile-bar {
  display: none;
  align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.mobile-bar-title { font-size: 14px; font-weight: 700; color: var(--text); }
.mobile-bar-right { display: flex; align-items: center; gap: 8px; }

.hamburger {
  display: flex; flex-direction: column; gap: 4px;
  cursor: pointer; border: none; background: none; padding: 6px;
}
.hamburger span { display: block; width: 20px; height: 2px; background: var(--muted); border-radius: 2px; transition: background .15s; }
.hamburger:hover span { background: var(--text); }

/* Tablet: collapse sidebar */
@media (max-width: 900px) {
  .sidebar { width: 200px; }
  .main { padding: 24px 20px 80px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
}

/* Mobile: hide sidebar, show top bar */
@media (max-width: 640px) {
  .shell { flex-direction: column; }
  .sidebar {
    position: fixed; left: 0; top: 0;
    width: 260px; height: 100vh;
    transform: translateX(-100%);
    transition: transform .25s ease;
    z-index: 30;
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-bar { display: flex; }
  .main { padding: 16px 14px 80px; }
  .grid { grid-template-columns: 1fr; gap: 10px; }
  .main-header { margin-bottom: 16px; }
  .main-title { font-size: 20px; }
  .modal-body { max-height: 75vh; padding: 16px 18px 20px; }
  .modal-header { padding: 18px 18px 0; }
  .modal-footer { padding: 12px 18px; }
  .modal-title { font-size: 17px; }
  pre { font-size: 11.5px; padding: 12px 14px; }
  .tab { padding: 8px 12px; font-size: 12px; }
  .ctable { font-size: 12px; }
  .ctable td, .ctable th { padding: 8px 10px; }
}

@media (max-width: 380px) {
  .grid { grid-template-columns: 1fr; }
  .overlay { padding: 12px 8px 40px; }
}
</style>
</head>
<body>
<div class="shell">

<!-- ── Sidebar ── -->
<nav class="sidebar" id="sidebar">
  <div class="sb-header">
    <div class="sb-app-name">Fiszki</div>
    <div class="sb-subtitle">6 tematów · 36 kart</div>
  </div>

  <div class="sb-section">Tematy</div>
  <button class="topic-item active" data-topic="all" style="--topic-accent:#888">
    <span class="topic-dot" style="background:#888"></span>Wszystkie
  </button>
  <button class="topic-item" data-topic="ddd" style="--topic-accent:var(--a-ddd)">
    <span class="topic-dot" style="background:var(--a-ddd)"></span>DDD
  </button>
  <button class="topic-item" data-topic="tdd" style="--topic-accent:var(--a-tdd)">
    <span class="topic-dot" style="background:var(--a-tdd)"></span>TDD
  </button>
  <button class="topic-item" data-topic="bdd" style="--topic-accent:var(--a-bdd)">
    <span class="topic-dot" style="background:var(--a-bdd)"></span>BDD
  </button>
  <button class="topic-item" data-topic="cqrs" style="--topic-accent:var(--a-cqrs)">
    <span class="topic-dot" style="background:var(--a-cqrs)"></span>CQRS
  </button>
  <button class="topic-item" data-topic="es" style="--topic-accent:var(--a-es)">
    <span class="topic-dot" style="background:var(--a-es)"></span>Event Sourcing
  </button>
  <button class="topic-item" data-topic="edd" style="--topic-accent:var(--a-edd)">
    <span class="topic-dot" style="background:var(--a-edd)"></span>Event-Driven
  </button>

  <div style="flex:1"></div>

  <div class="sb-stats">
    <div class="sb-stat-row"><span>Opanowane</span><span class="sb-stat-val" id="sb-learned">0 / 36</span></div>
    <div class="sb-progress"><div class="sb-progress-fill" id="sb-fill" style="width:0%"></div></div>
  </div>

  <button class="theme-toggle" id="theme-toggle">
    <div class="toggle-track"><div class="toggle-knob"></div></div>
    <span id="theme-label">Tryb jasny</span>
  </button>
</nav>

<!-- Backdrop for mobile sidebar -->
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<!-- ── Main ── -->
<main class="main" id="main-content">
  <!-- Mobile top bar -->
  <div class="mobile-bar">
    <button class="hamburger" id="mobile-menu" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <span class="mobile-bar-title" id="mobile-title">Fiszki</span>
    <div class="mobile-bar-right">
      <button class="theme-toggle" id="theme-toggle-mobile" style="border:none;padding:6px 8px;">
        <div class="toggle-track"><div class="toggle-knob"></div></div>
      </button>
    </div>
  </div>

  <div class="main-header">
    <div>
      <div class="main-topic-label" id="topic-label">Wszystkie tematy</div>
      <div class="main-title" id="main-title">DDD · TDD · BDD · CQRS · ES · EDD</div>
    </div>
  </div>

  <div class="sub-wrap" id="sub-wrap"></div>
  <div class="grid" id="grid"></div>
</main>
</div>

<!-- ── Modal ── -->
<div class="overlay" id="overlay">

<script>
const CARDS = [
/* ════════════════════════════════════════════ DDD ════════════════════════════════════════════ */
{id:'ddd-philosophy',topic:'ddd',sub:'filozofia',title:'DDD — filozofia i po co',difficulty:'★☆☆',
teaser:'Model oprogramowania odzwierciedla domenę biznesową. Kod mówi językiem eksperta, nie językiem bazy danych.',
def:`<div class="def-block"><strong>Domain-Driven Design</strong> to podejście do tworzenia oprogramowania, w którym <strong>domena biznesowa</strong> jest centrum wszystkich decyzji projektowych. Zaproponował je Eric Evans w książce z 2003 roku. Kluczowa teza: złożoność oprogramowania pochodzi głównie ze złożoności domeny — nie z technologii. Jeśli kod odzwierciedla domenę, zmiany biznesowe stają się naturalne. Jeśli kod jest zorganizowany wokół technologii (tabel, endpointów, frameworków), każda zmiana biznesowa wymaga "tłumaczenia".</div>
<div class="analogy-block"><div class="analogy-label">Analogia</div>Mapa metra. Możesz rysować ją geometrycznie dokładnie — ale pasażerowie potrzebują mapy, która oddaje logikę przesiadek i linii, nie rzeczywistą geografię. Harry Beck w 1933 roku stworzył mapę londyńskiego metra upraszczając rzeczywistość w sposób użyteczny dla podróżnych. DDD mówi: projektuj kod tak jak Beck projektował mapę — oddaj prawdę domeny, nie technologiczną implementację.</div>
<ul class="key-points">
<li>DDD to przede wszystkim <em>filozofia myślenia o kodzie</em> — wzorce taktyczne są narzędziem, nie celem</li>
<li>Sukces wymaga ścisłej współpracy z ekspertami domenowymi (domain experts)</li>
<li>Warto stosować przy złożonej domenie; dla prostych CRUDów to overkill</li>
<li>Eric Evans podzielił DDD na część <strong>strategiczną</strong> (granice, języki) i <strong>taktyczną</strong> (bloki budowania)</li>
<li>Vaughn Vernon i Greg Young rozwinęli DDD o Event Sourcing i CQRS</li>
</ul>`,
code:`<div class="code-label">DDD w nazewnictwie — ta sama logika, dwa style</div>
<pre><span class="c-bad">// ❌ Kod techniczny — myślimy tabelami i HTTP</span>
<span class="c-kw">void</span> <span class="c-fn">updateRecord</span>(<span class="c-type">int</span> id, <span class="c-type">int</span> statusCode, <span class="c-type">double</span> amount) {
    db.<span class="c-fn">execute</span>(<span class="c-str">"UPDATE orders SET status=?,amount=? WHERE id=?"</span>, statusCode, amount, id);
    http.<span class="c-fn">post</span>(<span class="c-str">"/notify"</span>, Map.<span class="c-fn">of</span>(<span class="c-str">"type"</span>, <span class="c-num">3</span>, <span class="c-str">"id"</span>, id));
}

<span class="c-ok">// ✅ Kod domenowy — myślimy biznesem</span>
<span class="c-kw">void</span> <span class="c-fn">confirmOrder</span>(<span class="c-type">OrderId</span> orderId, <span class="c-type">Money</span> paidAmount) {
    <span class="c-type">Order</span> order = orderRepository.<span class="c-fn">findById</span>(orderId);
    order.<span class="c-fn">confirmPayment</span>(paidAmount);   <span class="c-cmt">// logika wewnątrz obiektu</span>
    orderRepository.<span class="c-fn">save</span>(order);         <span class="c-cmt">// zdarzenia zostaną opublikowane</span>
}

<span class="c-cmt">// Nazwy klas odzwierciedlają domenę</span>
<span class="c-type">Customer</span>, <span class="c-type">Invoice</span>, <span class="c-type">Shipment</span>   <span class="c-cmt">// ✅ domenowe</span>
<span class="c-type">UserRecord</span>, <span class="c-type">DocEntity</span>, <span class="c-type">Item123</span> <span class="c-cmt">// ❌ techniczne</span></pre>`,
interview:[
{q:'Co to jest DDD i kiedy ma sens jego stosowanie?',a:'DDD to podejście do projektowania, gdzie model oprogramowania odzwierciedla domenę biznesową. Logika biznesowa żyje w obiektach domenowych (Entities, Aggregates), a nie w serwisach czy proceduralnych handlerach. Ma sens przy złożonej domenie, długim cyklu życia systemu i dostępnych ekspertach domenowych. Przy prostych CRUD-ach przynosi więcej kosztów niż korzyści.'},
{q:'Co to jest "model domenowy" i czym różni się od modelu danych?',a:'Model domenowy to reprezentacja pojęć, reguł i zachowań z dziedziny biznesowej — zawiera logikę, nie tylko dane. Model danych to schemat bazy — skupia się na przechowywaniu. W DDD model domenowy jest niezależny od modelu danych: Aggregate może być przechowywany w kilku tabelach, a wiele tabel może składać się na jeden obiekt domenowy. To rozdział odpowiedzialności między domeną a infrastrukturą.'},
]},

{id:'ddd-ubiquitous',topic:'ddd',sub:'strategia',title:'Ubiquitous Language',difficulty:'★☆☆',
teaser:'Jeden wspólny język dla biznesu i kodu. Ta sama nazwa w rozmowie, dokumentacji i klasie Java.',
def:`<div class="def-block"><strong>Ubiquitous Language</strong> to wspólny, ścisły język wypracowany z ekspertami domenowymi i używany dosłownie wszędzie — w rozmowach, ticket-ach, dokumentacji i w kodzie. Jedno pojęcie = jedna nazwa. Jeśli ekspert mówi "polisa", klasa nazywa się <code>Policy</code>, metoda <code>issuePolicy()</code>, test <code>should_issue_policy_for_new_customer()</code>.</div>
<div class="analogy-block"><div class="analogy-label">Analogia</div>Prawo. Ustawy definiują precyzyjnie każdy termin — "posiadacz", "właściciel", "osoba prawna". Prawnicy nie używają tych słów zamiennie, bo mają dokładne, różne znaczenia. Ubiquitous Language robi to samo dla domeny: każde pojęcie jest zdefiniowane i używane konsekwentnie przez wszystkich.</div>
<ul class="key-points">
<li>Język ewoluuje razem z rozumieniem domeny — refaktoryzacja nazw to normalna praca</li>
<li>Każda dwuznaczność w języku to sygnał niezrozumienia domeny</li>
<li>Słownik UL powinien być utrzymywany (wiki, ADR) i dostępny dla całego zespołu</li>
<li>Różne Bounded Contexty mogą mieć różne języki — "Order" w sprzedaży ≠ "Order" w dostawie</li>
</ul>`,
code:`<div class="code-label">Ubiquitous Language — od słowa do kodu</div>
<pre><span class="c-cmt">// Ekspert mówi: "ubezpieczyciel wystawia polisę na ryzyko po jego ocenie"</span>

<span class="c-bad">// ❌ Kod ignorujący język domeny</span>
<span class="c-kw">public</span> <span class="c-type">Document</span> <span class="c-fn">createDoc</span>(<span class="c-type">User</span> u, <span class="c-type">RiskData</span> r) {
    <span class="c-kw">if</span> (riskService.<span class="c-fn">calculate</span>(r) &lt; <span class="c-num">0.8</span>) {
        <span class="c-kw">return</span> docFactory.<span class="c-fn">make</span>(<span class="c-type">DocType</span>.POLICY, u, r);
    }
    <span class="c-kw">throw new</span> <span class="c-type">Exception</span>(<span class="c-str">"risk too high"</span>);
}

<span class="c-ok">// ✅ Kod mówiący językiem ubezpieczeń</span>
<span class="c-kw">public</span> <span class="c-type">Policy</span> <span class="c-fn">issuePolicy</span>(<span class="c-type">Applicant</span> applicant, <span class="c-type">Risk</span> risk) {
    <span class="c-type">RiskAssessment</span> assessment = underwriter.<span class="c-fn">assessRisk</span>(risk);
    <span class="c-kw">if</span> (assessment.<span class="c-fn">isAcceptable</span>()) {
        <span class="c-kw">return</span> <span class="c-type">Policy</span>.<span class="c-fn">issue</span>(applicant, risk, assessment);
    }
    <span class="c-kw">throw new</span> <span class="c-type">RiskTooHighException</span>(assessment);
}
<span class="c-cmt">// Ekspert przeczyta ten kod i zrozumie bez tłumaczenia</span></pre>`,
interview:[
{q:'Czym jest Ubiquitous Language i dlaczego jest fundamentem DDD?',a:'To wspólny, ścisły język domenowy używany przez biznes i deweloperów. W kodzie klasy, metody i zmienne mają nazwy z tego języka. Eliminuje "mapowanie mentalne" — gdy PM mówi "wystawiamy polisę", w kodzie jest issuePolicy(), nie createDocument(). Ubiquitous Language jest fundamentem, bo bez niego Bounded Context i model domenowy tracą sens — jest to klej łączący wiedzę biznesową z implementacją.'},
]},

{id:'ddd-bounded-context',topic:'ddd',sub:'strategia',title:'Bounded Context',difficulty:'★★☆',
teaser:'Wyraźna granica modelu. To samo słowo może znaczyć coś innego w różnych kontekstach — i to jest OK.',
def:`<div class="def-block"><strong>Bounded Context</strong> to wyraźna granica, w obrębie której jeden model domenowy jest spójny i jednoznaczny. Poza tą granicą te same słowa mogą mieć inne znaczenie, a inne obiekty mogą modelować tę samą "rzecz zewnętrzną". BC jest podstawową jednostką organizacji dużego systemu i naturalnie mapuje na moduł, serwis lub mikroserwis.</div>
<div class="analogy-block"><div class="analogy-label">Analogia</div>"Konto" w banku oznacza coś innego w dziale kredytów (zdolność kredytowa, historia spłat), w dziale inwestycji (portfel, ryzyko) i w IT (login, uprawnienia). To ta sama osoba — trzy różne modele, trzy różne Bounded Contexty.</div>
<ul class="key-points">
<li>Jeden Bounded Context = jeden team, jedno repo (w idealnym świecie)</li>
<li>Wewnątrz BC: jeden Ubiquitous Language, jeden model, jedna odpowiedzialność</li>
<li>Między BC: komunikacja przez API, zdarzenia lub Anti-Corruption Layer</li>
<li>BC ≠ mikroserwis — możesz mieć kilka BC w jednym serwisie (modularny monolit)</li>
<li><strong>Context Map</strong> to diagram wszystkich BC i relacji między nimi</li>
</ul>`,
code:`<div class="code-label">Ten sam "klient" — różne modele w różnych BC</div>
<pre><span class="c-cmt">// BC: Sprzedaż — interesuje nas historia zakupów i zniżki</span>
<span class="c-kw">class</span> <span class="c-type">Customer</span> {          <span class="c-cmt">// nazwa: Customer</span>
    <span class="c-type">CustomerId</span>   id;
    <span class="c-type">String</span>       name, email;
    <span class="c-type">LoyaltyTier</span>  tier;           <span class="c-cmt">// SILVER, GOLD, PLATINUM</span>
    <span class="c-type">List&lt;OrderId&gt;</span> orderHistory;
    <span class="c-kw">public</span> <span class="c-type">Discount</span> <span class="c-fn">calculateDiscount</span>() { ... }
}

<span class="c-cmt">// BC: Dostawa — interesuje nas adres i okna czasowe</span>
<span class="c-kw">class</span> <span class="c-type">Recipient</span> {          <span class="c-cmt">// inna nazwa! inne pola!</span>
    <span class="c-type">RecipientId</span>  id;
    <span class="c-type">FullName</span>     name;
    <span class="c-type">Address</span>      shippingAddress;
    <span class="c-type">TimeWindow</span>   preferredDelivery;
    <span class="c-type">Phone</span>        contactPhone;
    <span class="c-kw">public void</span> <span class="c-fn">notifyAboutDelay</span>(<span class="c-type">Duration</span> delay) { ... }
}

<span class="c-cmt">// BC: Support — interesuje nas historia zgłoszeń</span>
<span class="c-kw">class</span> <span class="c-type">Requester</span> {          <span class="c-cmt">// jeszcze inna nazwa!</span>
    <span class="c-type">RequesterId</span>     id;
    <span class="c-type">String</span>          email;
    <span class="c-type">List&lt;TicketId&gt;</span>  openTickets;
    <span class="c-type">SatisfactionScore</span> avgScore;
}</pre>`,
interview:[
{q:'Co to jest Bounded Context i jak odróżnić go od Domeny?',a:'Domena to cały obszar biznesowy (np. e-commerce). Bounded Context to konkretna, ograniczona część tej domeny z własnym modelem i językiem (np. "Zarządzanie zamówieniami", "Obsługa dostaw"). Jedna domena dzieli się na wiele BC. Bounded Context wyznacza granicę, w obrębie której Ubiquitous Language jest spójny i jednoznaczny.'},
{q:'Jak BC komunikują się ze sobą?',a:'Przez: (1) Domain Events — BC emituje zdarzenie, inne subskrybują. (2) Open Host Service — BC wystawia stabilne API. (3) Anti-Corruption Layer — translator chroniący własny model przed modelem zewnętrznym. (4) Shared Kernel — wspólna część modelu (ryzykowne, wymaga koordynacji). Kluczowe: komunikacja zawsze przez granicę, nigdy bezpośrednio do wewnętrznych obiektów innego BC.'},
]},

{id:'ddd-entity-vo',topic:'ddd',sub:'taktyka',title:'Entity vs Value Object',difficulty:'★★☆',
teaser:'Entity: tożsamość przez ID, zmienia stan. Value Object: tożsamość przez wartość, immutable.',
def:`<div class="def-block"><strong>Entity</strong> — obiekt z unikalną tożsamością niezależną od wartości pól. Dwie encje mogą mieć identyczne dane i nadal być różnymi obiektami (np. dwa zamówienia na ten sam produkt). Tożsamość to zwykle ID generowane przy tworzeniu.</div>
<div class="def-block"><strong>Value Object</strong> — obiekt, którego tożsamość wynika wyłącznie z wartości. Dwa VO z tymi samymi wartościami są identyczne i wymienne. Zawsze <strong>immutable</strong> — zamiast mutować, tworzysz nowy obiekt. Niosą logikę i walidację.</div>
<table class="ctable">
<tr><th>Aspekt</th><th>Entity</th><th>Value Object</th></tr>
<tr><td>Tożsamość</td><td>ID (UUID, Long)</td><td>Wartość pól</td></tr>
<tr><td>Mutowalność</td><td>Tak — stan zmienia się</td><td class="yes">Immutable</td></tr>
<tr><td>equals()</td><td>Po ID</td><td>Po wartościach</td></tr>
<tr><td>Przykłady</td><td>Order, Customer, Invoice</td><td>Money, Address, Email, DateRange</td></tr>
<tr><td>Żywotność</td><td>Długa, trwała</td><td>Krótka, tworzone i wyrzucane</td></tr>
</table>`,
code:`<div class="code-label">Entity z tożsamością i Value Object z logiką</div>
<pre><span class="c-cmt">// ENTITY — tożsamość przez ID, mutowalny stan</span>
<span class="c-kw">public class</span> <span class="c-type">Order</span> {                         <span class="c-cmt">// Entity</span>
    <span class="c-kw">private final</span> <span class="c-type">OrderId</span> id;               <span class="c-cmt">// final — nigdy nie zmienia się</span>
    <span class="c-kw">private</span>       <span class="c-type">OrderStatus</span> status;        <span class="c-cmt">// zmienia się w czasie</span>
    <span class="c-kw">private</span>       <span class="c-type">Money</span> total;

    <span class="c-kw">public boolean</span> <span class="c-fn">equals</span>(<span class="c-type">Object</span> o) {       <span class="c-cmt">// równość przez ID</span>
        <span class="c-kw">return</span> o <span class="c-kw">instanceof</span> <span class="c-type">Order</span> other
            &amp;&amp; <span class="c-kw">this</span>.id.<span class="c-fn">equals</span>(other.id);
    }
}

<span class="c-cmt">// VALUE OBJECT — immutable, logika, walidacja, równość przez wartość</span>
<span class="c-kw">public final class</span> <span class="c-type">Money</span> {                  <span class="c-cmt">// final — nie dziedzicz</span>
    <span class="c-kw">private final</span> <span class="c-type">BigDecimal</span> amount;
    <span class="c-kw">private final</span> <span class="c-type">Currency</span>  currency;

    <span class="c-kw">public</span> <span class="c-type">Money</span>(<span class="c-type">BigDecimal</span> amount, <span class="c-type">Currency</span> currency) {
        <span class="c-kw">if</span> (amount.<span class="c-fn">signum</span>() &lt; <span class="c-num">0</span>) <span class="c-kw">throw new</span> <span class="c-type">NegativeAmountException</span>();
        <span class="c-kw">this</span>.amount = amount.<span class="c-fn">setScale</span>(<span class="c-num">2</span>, HALF_UP);
        <span class="c-kw">this</span>.currency = <span class="c-type">Objects</span>.<span class="c-fn">requireNonNull</span>(currency);
    }

    <span class="c-kw">public</span> <span class="c-type">Money</span> <span class="c-fn">add</span>(<span class="c-type">Money</span> other) {           <span class="c-cmt">// NOWY obiekt — nie mutuje</span>
        <span class="c-kw">if</span> (!currency.<span class="c-fn">equals</span>(other.currency)) <span class="c-kw">throw new</span> <span class="c-type">CurrencyMismatchException</span>();
        <span class="c-kw">return new</span> <span class="c-type">Money</span>(amount.<span class="c-fn">add</span>(other.amount), currency);
    }
    <span class="c-kw">public</span> <span class="c-type">Money</span> <span class="c-fn">percentage</span>(<span class="c-type">int</span> pct) {
        <span class="c-kw">return new</span> <span class="c-type">Money</span>(amount.<span class="c-fn">multiply</span>(<span class="c-type">BigDecimal</span>.<span class="c-fn">valueOf</span>(pct, <span class="c-num">2</span>)), currency);
    }
    <span class="c-cmt">// equals/hashCode przez amount+currency (record w Javie 16+ robi to automatycznie)</span>
}</pre>`,
interview:[
{q:'Czym różni się Entity od Value Object?',a:'Entity ma unikalną tożsamość (ID) i może zmieniać stan w czasie — dwa obiekty z tymi samymi danymi to nadal dwa różne Entity. Value Object nie ma tożsamości — definiuje go wyłącznie wartość, jest immutable. Dwa Money(100, PLN) są identyczne i wymienne. VO enkapsulują walidację i logikę domenową. Przykłady VO: Money, Address, Email, DateRange, Quantity.'},
{q:'Dlaczego Value Object powinien być immutable?',a:'Bezpieczeństwo wątkowe bez synchronizacji, brak ukrytych efektów ubocznych. Jeśli przekazuję Money do metody i jest mutable, metoda może zmienić wartość i mój obiekt się zmienia bez mojej wiedzy. Immutability sprawia że VO można bezpiecznie współdzielić. Wzorzec: zamiast setAmount(), zwracasz new Money(newAmount, currency).'},
]},

{id:'ddd-aggregate',topic:'ddd',sub:'taktyka',title:'Aggregate i Aggregate Root',difficulty:'★★★',
teaser:'Klaster obiektów z jednym punktem wejścia. Root pilnuje wszystkich niezmienników. Granica transakcji.',
def:`<div class="def-block"><strong>Aggregate</strong> to klaster powiązanych Entity i Value Objectów traktowany jako jeden spójny byt. Każdy Aggregate ma <strong>Aggregate Root</strong> — jedyną klasę dostępną z zewnątrz. Granica Aggregate to granica transakcji: jedna operacja modyfikuje jeden Aggregate.</div>
<div class="steps">
<div class="step"><div class="step-num sn-r">1</div><div class="step-body"><div class="step-title">Root jako "CEO"</div>Zewnętrzny kod zawsze wchodzi przez Root. Nie można bezpośrednio modyfikować wewnętrznych Entity.</div></div>
<div class="step"><div class="step-num sn-g">2</div><div class="step-body"><div class="step-title">Niezmienniki biznesowe</div>Root gwarantuje że agregat nigdy nie znajdzie się w sprzecznym stanie. Wszystkie reguły są sprawdzane przy każdej operacji.</div></div>
<div class="step"><div class="step-num sn-b">3</div><div class="step-body"><div class="step-title">Referencje przez ID</div>Aggregate nie trzyma referencji obiektowych do innych Aggregatów — tylko ich ID. Jeden Aggregate = jedna transakcja.</div></div>
</div>
<div class="warn-block"><div class="warn-label">Zasada projektowania</div>Małe Aggregaty. Im większy Aggregate, tym więcej konfliktów przy równoczesnym dostępie. Zacznij mały, powiększaj tylko gdy niezmienniki tego wymagają.</div>`,
code:`<div class="code-label">Aggregate Root — kontrola dostępu i niezmienniki</div>
<pre><span class="c-kw">public class</span> <span class="c-type">Order</span> {  <span class="c-cmt">// Aggregate Root</span>
    <span class="c-kw">private final</span> <span class="c-type">OrderId</span>       id;
    <span class="c-kw">private final</span> <span class="c-type">CustomerId</span>    customerId;  <span class="c-cmt">// ref do innego AR — tylko ID!</span>
    <span class="c-kw">private</span>       <span class="c-type">OrderStatus</span>   status;
    <span class="c-kw">private final</span> <span class="c-type">List&lt;OrderItem&gt;</span> items = <span class="c-kw">new</span> <span class="c-type">ArrayList&lt;&gt;</span>();
    <span class="c-kw">private final</span> <span class="c-type">List&lt;DomainEvent&gt;</span> events = <span class="c-kw">new</span> <span class="c-type">ArrayList&lt;&gt;</span>();

    <span class="c-kw">public void</span> <span class="c-fn">addItem</span>(<span class="c-type">ProductId</span> productId, <span class="c-type">Quantity</span> qty, <span class="c-type">Money</span> price) {
        <span class="c-fn">require</span>(status == <span class="c-type">DRAFT</span>, <span class="c-str">"Tylko szkic można edytować"</span>);
        <span class="c-fn">require</span>(items.<span class="c-fn">size</span>() &lt; <span class="c-num">50</span>,  <span class="c-str">"Max 50 pozycji"</span>);   <span class="c-cmt">// niezmiennik!</span>
        items.<span class="c-fn">add</span>(<span class="c-kw">new</span> <span class="c-type">OrderItem</span>(productId, qty, price));
    }

    <span class="c-kw">public void</span> <span class="c-fn">confirm</span>() {
        <span class="c-fn">require</span>(status == <span class="c-type">DRAFT</span>);
        <span class="c-fn">require</span>(!items.<span class="c-fn">isEmpty</span>(), <span class="c-str">"Zamówienie nie może być puste"</span>);
        <span class="c-kw">this</span>.status = <span class="c-type">CONFIRMED</span>;
        events.<span class="c-fn">add</span>(<span class="c-kw">new</span> <span class="c-type">OrderConfirmed</span>(id, <span class="c-fn">calculateTotal</span>()));
    }

    <span class="c-cmt">// Dostęp do listy — tylko do odczytu!</span>
    <span class="c-kw">public</span> <span class="c-type">List&lt;OrderItem&gt;</span> <span class="c-fn">getItems</span>() {
        <span class="c-kw">return</span> <span class="c-type">Collections</span>.<span class="c-fn">unmodifiableList</span>(items);
    }

    <span class="c-bad">// ❌ NIE MA setStatus() — enkapsulacja chroni niezmienniki</span>
}</pre>`,
interview:[
{q:'Co to jest Aggregate i dlaczego granica transakcji?',a:'Aggregate to klaster Entity i VO z jednym Aggregate Rootem — jedynym punktem wejścia. Granica Aggregate = granica transakcji: jedna operacja biznesowa modyfikuje dokładnie jeden Aggregate. To daje spójność bez distributed transactions. Root pilnuje wszystkich niezmienników całego klastra. Referencje do innych AR tylko przez ID — zapobiega rozciąganiu granic transakcji.'},
{q:'Jak zaprojektować właściwy rozmiar Aggregate?',a:'Zasada: zacznij od małych. Pytanie: "czy te dwa obiekty muszą być spójne w ramach jednej transakcji?". Jeśli tak — mogą być w jednym Aggregate. Jeśli można je aktualizować niezależnie — powinny być oddzielnymi AR z referencją przez ID. Duże Aggregaty = więcej konfliktów przy równoczesnym dostępie (optimistic locking exceptions) i wolniejszy zapis.'},
]},

{id:'ddd-domain-events',topic:'ddd',sub:'taktyka',title:'Domain Events',difficulty:'★★☆',
teaser:'Fakt z przeszłości w domenie. Immutable, nazwa w czasie przeszłym. Klej między Bounded Contextami.',
def:`<div class="def-block"><strong>Domain Event</strong> to niezmienne zdarzenie reprezentujące coś ważnego, co wydarzyło się w domenie. Zawsze w czasie przeszłym: <em>OrderPlaced</em>, <em>PaymentConfirmed</em>, <em>PolicyIssued</em>. Agregat rejestruje zdarzenia wewnątrz siebie — infrastruktura je publikuje po zapisaniu.</div>
<ul class="key-points">
<li>Immutable — historia nie jest edytowalna</li>
<li>Zawiera wszystkie dane potrzebne konsumentom (denormalizowany payload)</li>
<li>Odpowiada za luźne powiązanie między BC — nadawca nie zna odbiorców</li>
<li>Podstawa Event Sourcingu i asynchronicznej integracji</li>
<li>Różny od <em>Integration Event</em> — domain event to wewnętrzny BC, integration event to publiczny kontrakt między BC</li>
</ul>
<div class="ok-block"><div class="ok-label">Wzorzec rejestracji</div>Aggregate Root rejestruje zdarzenia w liście wewnętrznej. Po zapisaniu aggregate, Application Service/Repository publikuje zdarzenia. Unikamy publikowania przed commitem transakcji.</div>`,
code:`<div class="code-label">Domain Event — definicja, rejestracja i publikacja</div>
<pre><span class="c-cmt">// Zdarzenie — record (Java 16+), immutable z definicji</span>
<span class="c-kw">public record</span> <span class="c-type">OrderConfirmed</span>(
    <span class="c-type">OrderId</span>    orderId,
    <span class="c-type">CustomerId</span> customerId,
    <span class="c-type">Money</span>      total,
    <span class="c-type">Instant</span>    confirmedAt   <span class="c-cmt">// czas zdarzenia, nie "now()" z handlera</span>
) <span class="c-kw">implements</span> <span class="c-type">DomainEvent</span> {}

<span class="c-cmt">// W Aggregate Root:</span>
<span class="c-kw">public void</span> <span class="c-fn">confirm</span>() {
    <span class="c-fn">require</span>(status == <span class="c-type">DRAFT</span>);
    <span class="c-kw">this</span>.status = <span class="c-type">CONFIRMED</span>;
    <span class="c-kw">this</span>.confirmedAt = <span class="c-type">Instant</span>.<span class="c-fn">now</span>();
    <span class="c-fn">registerEvent</span>(<span class="c-kw">new</span> <span class="c-type">OrderConfirmed</span>(id, customerId, <span class="c-fn">total</span>(), confirmedAt));
}

<span class="c-cmt">// Application Service — publikuje PO commicie</span>
<span class="c-ann">@Transactional</span>
<span class="c-kw">public void</span> <span class="c-fn">confirmOrder</span>(<span class="c-type">OrderId</span> id) {
    <span class="c-type">Order</span> order = repo.<span class="c-fn">findById</span>(id);
    order.<span class="c-fn">confirm</span>();
    repo.<span class="c-fn">save</span>(order);                           <span class="c-cmt">// commit transakcji</span>
    order.<span class="c-fn">getDomainEvents</span>().<span class="c-fn">forEach</span>(eventBus::<span class="c-fn">publish</span>); <span class="c-cmt">// PO commicie</span>
}

<span class="c-cmt">// Konsumenci w innych BC — całkowicie niezależni</span>
<span class="c-ann">@EventHandler</span> <span class="c-kw">void</span> <span class="c-fn">on</span>(<span class="c-type">OrderConfirmed</span> e) { invoicing.<span class="c-fn">createInvoice</span>(e); }
<span class="c-ann">@EventHandler</span> <span class="c-kw">void</span> <span class="c-fn">on</span>(<span class="c-type">OrderConfirmed</span> e) { warehouse.<span class="c-fn">reserveStock</span>(e); }</pre>`,
interview:[
{q:'Czym jest Domain Event i jak różni się od Integration Event?',a:'Domain Event to fakt z domeny — wewnętrzny dla BC, np. OrderConfirmed z pełnymi szczegółami. Integration Event to publiczny kontrakt między BC — zawiera tylko dane potrzebne konsumentom zewnętrznym, ma stabilne API i jest wersjonowany. Domain Event można swobodnie refaktoryzować wewnątrz BC; Integration Event zmienia się ostrożnie bo łamie kontrakt z innymi BC.'},
]},

{id:'ddd-repository',topic:'ddd',sub:'taktyka',title:'Repository i Factory',difficulty:'★★☆',
teaser:'Repository: abstrakcja kolekcji domenowej. Factory: enkapsulacja złożonego tworzenia obiektów.',
def:`<div class="def-block"><strong>Repository</strong> to abstrakcja udająca kolekcję obiektów domenowych. Interfejs należy do warstwy domenowej (definiuje kontrakt), implementacja do infrastruktury (JPA, Mongo, Redis). Jeden Repository na jeden Aggregate Root.</div>
<div class="def-block"><strong>Factory</strong> enkapsuluje złożoną logikę tworzenia Aggregate lub Value Objectu. Gdy konstruktor Aggregate wymaga wielu kroków, walidacji lub zależności — Factory upraszcza punkt wywołania i chroni niezmienniki od pierwszego momentu istnienia obiektu.</div>
<ul class="key-points">
<li>Repository ukrywa technologię persystencji — testy używają InMemoryRepository</li>
<li>Repository <em>nie</em> jest generickim DAO — metody mają nazwy domenowe: <code>findActiveOrdersForCustomer()</code></li>
<li>Factory Method na Aggregate Rootcie to najprostszy wzorzec: <code>Order.createDraft(customerId)</code></li>
<li>Osobna klasa Factory gdy tworzenie wymaga zewnętrznych zależności (ID generator, clock)</li>
</ul>`,
code:`<div class="code-label">Repository interfejs + implementacje + Factory</div>
<pre><span class="c-cmt">// Interfejs — warstwa domenowa, zero zależności od JPA</span>
<span class="c-kw">public interface</span> <span class="c-type">OrderRepository</span> {
    <span class="c-type">Optional&lt;Order&gt;</span> <span class="c-fn">findById</span>(<span class="c-type">OrderId</span> id);
    <span class="c-type">List&lt;Order&gt;</span>     <span class="c-fn">findActiveByCustomer</span>(<span class="c-type">CustomerId</span> cid);
    <span class="c-kw">void</span>             <span class="c-fn">save</span>(<span class="c-type">Order</span> order);
    <span class="c-kw">void</span>             <span class="c-fn">delete</span>(<span class="c-type">OrderId</span> id);
}

<span class="c-cmt">// Implementacja — infrastruktura (JPA)</span>
<span class="c-ann">@Repository</span>
<span class="c-kw">class</span> <span class="c-type">JpaOrderRepository</span> <span class="c-kw">implements</span> <span class="c-type">OrderRepository</span> {
    <span class="c-kw">public</span> <span class="c-type">Optional&lt;Order&gt;</span> <span class="c-fn">findById</span>(<span class="c-type">OrderId</span> id) {
        <span class="c-kw">return</span> jpa.<span class="c-fn">findById</span>(id.<span class="c-fn">value</span>()).<span class="c-fn">map</span>(mapper::<span class="c-fn">toDomain</span>);
    }
}

<span class="c-cmt">// Test — in-memory, zero infrastruktury</span>
<span class="c-kw">class</span> <span class="c-type">InMemoryOrderRepository</span> <span class="c-kw">implements</span> <span class="c-type">OrderRepository</span> {
    <span class="c-kw">private final</span> <span class="c-type">Map&lt;OrderId, Order&gt;</span> store = <span class="c-kw">new</span> <span class="c-type">HashMap&lt;&gt;</span>();
    <span class="c-kw">public</span> <span class="c-type">Optional&lt;Order&gt;</span> <span class="c-fn">findById</span>(<span class="c-type">OrderId</span> id) {
        <span class="c-kw">return</span> <span class="c-type">Optional</span>.<span class="c-fn">ofNullable</span>(store.<span class="c-fn">get</span>(id));
    }
    <span class="c-kw">public void</span> <span class="c-fn">save</span>(<span class="c-type">Order</span> o) { store.<span class="c-fn">put</span>(o.<span class="c-fn">getId</span>(), o); }
}

<span class="c-cmt">// Factory method na AR — chroni niezmienniki od chwili 0</span>
<span class="c-kw">public class</span> <span class="c-type">Order</span> {
    <span class="c-kw">public static</span> <span class="c-type">Order</span> <span class="c-fn">createDraft</span>(<span class="c-type">CustomerId</span> cid, <span class="c-type">Clock</span> clock) {
        <span class="c-type">OrderId</span> id = <span class="c-type">OrderId</span>.<span class="c-fn">generate</span>();
        <span class="c-type">Order</span> order = <span class="c-kw">new</span> <span class="c-type">Order</span>(id, cid, <span class="c-type">DRAFT</span>, clock.<span class="c-fn">instant</span>());
        order.<span class="c-fn">registerEvent</span>(<span class="c-kw">new</span> <span class="c-type">OrderCreated</span>(id, cid));
        <span class="c-kw">return</span> order;
    }
}</pre>`,
interview:[
{q:'Czym różni się Repository od DAO?',a:'DAO (Data Access Object) to wzorzec techniczny skupiony na operacjach CRUD na tabelach. Repository to wzorzec domenowy — ukrywa szczegóły persystencji i dostarcza interfejs w języku domeny. Repository operuje na Aggregatach (nie tabelach), a jego metody mają nazwy domenowe jak findActiveOrdersForCustomer() zamiast getByStatusAndCustomerId(). Interfejs Repository należy do warstwy domenowej, implementacja do infrastruktury.'},
]},

{id:'ddd-arch',topic:'ddd',sub:'architektura',title:'Architektura warstwowa i Hexagonal',difficulty:'★★★',
teaser:'Domain jest centrum. Infrastruktura i UI zależą od domeny — nie odwrotnie. Ports & Adapters.',
def:`<div class="def-block"><strong>Layered Architecture w DDD:</strong> domena jest centrum — zero zależności do frameworków. Application Layer orkiestruje przypadki użycia. Infrastructure implementuje interfejsy domenowe. Presentation mapuje żądania na komendy.</div>
<div class="def-block"><strong>Hexagonal Architecture (Ports & Adapters)</strong> idzie dalej: domena definiuje porty (interfejsy), adaptery to implementacje (REST, JPA, Kafka). Aplikacja jest "odwrócona" — zewnętrzny świat adapuje się do domeny, nie odwrotnie.</div>
<ul class="key-points">
<li><strong>Domain Layer</strong>: Entity, VO, Aggregate, Domain Service, interfejsy Repository — zero importów frameworków</li>
<li><strong>Application Layer</strong>: Use case-y, Command Handlers — orkiestracja bez logiki biznesowej</li>
<li><strong>Infrastructure Layer</strong>: JPA, Kafka, S3, REST clients — implementacje portów</li>
<li><strong>Presentation Layer</strong>: REST, GraphQL, CLI — mapuje wejście na komendy aplikacji</li>
<li>Testy domeny nie wymagają Spring context ani bazy danych</li>
</ul>`,
code:`<div class="code-label">Struktura modułu — Domain jako core, reszta zależna od Domain</div>
<pre><span class="c-cmt">// Struktura pakietów dla BC "orders"</span>
orders/
  domain/
    model/
      Order.java          <span class="c-cmt">// Aggregate Root — zero Spring/JPA</span>
      OrderItem.java      <span class="c-cmt">// Entity wewnątrz AR</span>
      Money.java          <span class="c-cmt">// Value Object</span>
      OrderStatus.java    <span class="c-cmt">// Enum domenowy</span>
    events/
      OrderConfirmed.java <span class="c-cmt">// Domain Event</span>
    ports/
      OrderRepository.java    <span class="c-cmt">// Port (interfejs) — NALEŻY DO DOMENY</span>
      PaymentGateway.java     <span class="c-cmt">// Port do zewnętrznego serwisu</span>
    service/
      PricingDomainService.java <span class="c-cmt">// Domain Service</span>

  application/
    PlaceOrderUseCase.java    <span class="c-cmt">// orchestruje, nie zawiera logiki biz.</span>
    PlaceOrderCommand.java

  infrastructure/
    JpaOrderRepository.java   <span class="c-cmt">// Adapter — implementuje port</span>
    StripePaymentGateway.java  <span class="c-cmt">// Adapter</span>
    OrderJpaEntity.java        <span class="c-cmt">// Mapowanie JPA ≠ Domain model</span>

  api/
    OrderController.java       <span class="c-cmt">// REST — Adapter wejściowy</span>
    OrderRequest.java          <span class="c-cmt">// DTO — nie trafia do domeny</span></pre>`,
interview:[
{q:'Co to jest Hexagonal Architecture i jak ma się do DDD?',a:'Hexagonal Architecture (Ports & Adapters) to styl architektoniczny, gdzie domena jest centrum, a zewnętrzny świat komunikuje się z nią przez porty (interfejsy) i adaptery (implementacje). W DDD domain layer definiuje porty — interfejsy Repository, zewnętrznych serwisów. Infrastructure implementuje te porty. Domena nie wie nic o Spring, JPA ani Kafka. Korzyść: testy domeny bez infrastruktury, łatwa wymiana adapterów.'},
]},
