<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSONcraft — Format & Verify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,300;1,7..72,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1c1917;
    --bg2: #231f1c;
    --bg3: #2c2724;
    --bg4: #38322e;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.10);
    --text: #e8e0d5;
    --text2: #a09880;
    --text3: #635a50;
    --accent: #c9a96e;
    --accent2: #dfc28e;
    --accent-glow: rgba(201,169,110,0.12);
    --green: #7fb77e;
    --green-bg: rgba(127,183,126,0.08);
    --red: #c97b72;
    --red-bg: rgba(201,123,114,0.08);
    --yellow: #c9a96e;
    --yellow-bg: rgba(201,169,110,0.08);
    --blue: #7ea8c9;
    --blue-bg: rgba(126,168,201,0.08);
    --string: #98b898;
    --number: #c9a06e;
    --bool: #7ea8c9;
    --null-c: #a898c8;
    --key: #d4a080;
    --bracket: #706560;
    --shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  [data-theme="light"] {
    --bg: #f5f0e8;
    --bg2: #fdf8f0;
    --bg3: #f0ebe0;
    --bg4: #e8e0d0;
    --border: rgba(120,100,70,0.10);
    --border2: rgba(120,100,70,0.18);
    --text: #2c2418;
    --text2: #6b5c48;
    --text3: #a0907c;
    --accent: #8b6914;
    --accent2: #6b5010;
    --accent-glow: rgba(139,105,20,0.10);
    --green: #3d7a3a;
    --green-bg: rgba(61,122,58,0.07);
    --red: #9a3228;
    --red-bg: rgba(154,50,40,0.07);
    --yellow: #8b6914;
    --yellow-bg: rgba(139,105,20,0.07);
    --blue: #2a5c8a;
    --blue-bg: rgba(42,92,138,0.07);
    --string: #3a6e3a;
    --number: #8b5010;
    --bool: #2a5c8a;
    --null-c: #6a4a8a;
    --key: #7a3a18;
    --bracket: #8a7a68;
    --shadow: 0 20px 60px rgba(0,0,0,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Literata', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 600;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-valid { background: var(--green-bg); color: var(--green); border: 1px solid rgba(127,183,126,0.25); }
  .badge-invalid { background: var(--red-bg); color: var(--red); border: 1px solid rgba(201,123,114,0.25); }
  .badge-idle { background: var(--bg4); color: var(--text3); border: 1px solid var(--border); }

  .theme-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .theme-btn:hover { background: var(--bg4); color: var(--text); }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .toolbar-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    font-family: 'Literata', Georgia, serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .toolbar-btn:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
  .toolbar-btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .toolbar-btn.primary:hover { opacity: 0.85; }
  .toolbar-btn svg { width: 14px; height: 14px; }
  .separator { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; }
  .indent-control { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
  .indent-control select {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border2);
    border-radius: 6px; padding: 5px 8px; font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; cursor: pointer;
  }

  /* Main layout */
  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: calc(100vh - 110px);
  }
  @media (max-width: 768px) {
    .workspace { grid-template-columns: 1fr; }
  }

  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    min-height: 0;
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .panel-header-left { display: flex; align-items: center; gap: 8px; }
  .panel-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }
  .line-count { font-family: 'IBM Plex Mono', monospace; font-size: 10px; }

  /* Editor */
  .editor-wrap {
    position: relative;
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .line-numbers {
    padding: 16px 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text3);
    text-align: right;
    user-select: none;
    min-width: 44px;
    padding-right: 12px;
    padding-left: 8px;
    overflow: hidden;
    white-space: pre;
  }
  .editor-textarea {
    flex: 1;
    background: var(--bg2);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 16px;
    caret-color: var(--accent);
    tab-size: 2;
    white-space: pre;
    overflow: auto;
  }
  .editor-textarea::selection { background: var(--accent-glow); }
  .editor-textarea::placeholder { color: var(--text3); }

  /* Output — see tree styles below */

  /* Syntax highlighting */
  .j-key { color: var(--key); }
  .j-str { color: var(--string); }
  .j-num { color: var(--number); }
  .j-bool { color: var(--bool); }
  .j-null { color: var(--null-c); }
  .j-bracket { color: var(--bracket); }
  .j-punctuation { color: var(--text3); }

  /* Collapsible nodes */
  .j-node { white-space: pre; }
  .j-collapsible { cursor: pointer; }
  .j-collapsible::before {
    content: '▾';
    display: inline-block;
    width: 12px;
    font-size: 10px;
    color: var(--text3);
    margin-right: 2px;
    transition: transform 0.15s;
  }
  .j-collapsible.collapsed::before { transform: rotate(-90deg); }
  .j-collapsible-content.hidden { display: none; }
  .j-ellipsis { color: var(--text3); font-style: italic; }

  /* Errors panel */
  .errors-panel {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    max-height: 200px;
    overflow-y: auto;
  }
  .errors-header {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .error-count {
    background: var(--red-bg);
    color: var(--red);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 600;
  }
  .error-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.15s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .error-icon {
    font-size: 14px;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .error-body { flex: 1; }
  .error-msg { font-size: 12px; color: var(--red); font-weight: 500; margin-bottom: 2px; }
  .error-hint {
    font-size: 11px;
    color: var(--text2);
    font-family: 'Literata', Georgia, serif;
  }
  .error-hint code {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg4);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 10px;
    color: var(--yellow);
  }
  .error-location {
    font-size: 11px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
    margin-top: 1px;
  }

  .success-msg {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    color: var(--green);
    font-size: 12px; font-weight: 500;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    gap: 12px;
    padding: 40px;
    text-align: center;
  }
  .empty-icon {
    width: 56px; height: 56px;
    border: 1px solid var(--border2);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    background: var(--bg3);
  }
  .empty-state p { font-size: 13px; line-height: 1.6; max-width: 200px; }

  /* Stats bar */
  .stats-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 7px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }
  .stat-item { display: flex; align-items: center; gap: 5px; }
  .stat-label { color: var(--text3); }
  .stat-val { color: var(--text2); font-weight: 500; }

  /* Copy feedback */
  .copy-toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--green);
    color: #fff;
    padding: 10px 18px;
    border-radius: 5px;
    font-size: 13px; font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }
  .copy-toast.show { opacity: 1; transform: translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  .highlight-line {
    background: rgba(248,113,113,0.06);
    display: block;
  }
  /* ── Output tree ── */
  .output-panel {
    flex: 1;
    background: var(--bg);
    overflow: auto;
    padding: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
  }
  .tree-wrap {
    display: flex;
    min-height: 100%;
  }
  .tree-line-numbers {
    padding: 14px 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text3);
    text-align: right;
    user-select: none;
    min-width: 42px;
    padding-right: 10px;
    padding-left: 6px;
    white-space: pre;
    flex-shrink: 0;
  }
  .tree-body {
    flex: 1;
    padding: 14px 0 14px 0;
    overflow-x: auto;
  }
  .tree-row {
    display: flex;
    align-items: center;
    min-height: 23.1px; /* line-height: 1.7 * 13.6px */
    padding: 0 16px;
    position: relative;
    white-space: nowrap;
  }
  .tree-row:hover { background: var(--border); }
  .tree-row:hover .row-copy { opacity: 1; }
  .tree-indent {
    display: inline-flex;
    flex-shrink: 0;
  }
  .indent-guide {
    display: inline-block;
    width: 20px;
    flex-shrink: 0;
    position: relative;
  }
  .indent-guide::before {
    content: '';
    position: absolute;
    left: 9px;
    top: -4px;
    bottom: -4px;
    width: 1px;
    background: var(--border2);
  }
  .toggle-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    cursor: pointer;
    color: var(--text3);
    font-size: 9px;
    border-radius: 3px;
    margin-right: 2px;
    user-select: none;
    transition: color 0.15s, background 0.15s;
  }
  .toggle-btn:hover { color: var(--text); background: var(--bg4); }
  .toggle-placeholder { display: inline-block; width: 18px; flex-shrink: 0; }
  .j-key   { color: var(--key); }
  .j-str   { color: var(--string); }
  .j-num   { color: var(--number); }
  .j-bool  { color: var(--bool); }
  .j-null  { color: var(--null-c); }
  .j-bracket { color: var(--bracket); }
  .j-punctuation { color: var(--text3); }
  .j-colon { color: var(--text3); margin: 0 4px; }
  .j-comma { color: var(--text3); }
  .collapsed-preview {
    color: var(--text3);
    font-style: italic;
    margin-left: 4px;
    font-size: 11px;
  }
  .type-badge {
    display: inline-block;
    font-size: 9px;
    padding: 0px 5px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
    opacity: 0.6;
    font-style: normal;
    background: var(--bg4);
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
  }
  .row-copy {
    opacity: 0;
    margin-left: auto;
    padding-left: 12px;
    cursor: pointer;
    color: var(--text3);
    font-size: 10px;
    font-family: 'Literata', Georgia, serif;
    transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .row-copy:hover { color: var(--accent); }

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">{}</div>
    JSON<span>craft</span>
  </div>
  <div class="header-right">
    <span class="badge badge-idle" id="status-badge">Waiting for input</span>
    <button class="theme-btn" id="theme-toggle" title="Toggle theme">☀️</button>
  </div>
</header>

<div class="toolbar">
  <button class="toolbar-btn primary" onclick="formatJSON()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h8M4 18h12"/></svg>
    Format
  </button>
  <button class="toolbar-btn" onclick="minifyJSON()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    Minify
  </button>
  <button class="toolbar-btn" onclick="sortKeys()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h6"/></svg>
    Sort Keys
  </button>
  <button class="toolbar-btn" onclick="formatInput()" id="fmt-input-btn" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h3m0 0V4m0 3a9 9 0 019 9M7 7L4 4m16 7h-3m0 0v3m0-3a9 9 0 01-9 9m9-9l3 3"/></svg>
    Format Input
  </button>
  <div class="separator"></div>
  <button class="toolbar-btn" onclick="copyOutput()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    Copy Output
  </button>
  <button class="toolbar-btn" onclick="clearAll()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M8 6V4h8v2"/></svg>
    Clear
  </button>
  <button class="toolbar-btn" onclick="loadSample()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>
    Sample
  </button>
  <div class="separator"></div>
  <div class="indent-control">
    <span>Indent</span>
    <select id="indent-size" onchange="formatJSON()">
      <option value="2">2 spaces</option>
      <option value="4">4 spaces</option>
      <option value="tab">Tab</option>
    </select>
  </div>
</div>

<div class="workspace">
  <!-- Input Panel -->
  <div class="panel" style="flex-direction:column;display:flex;">
    <div class="panel-header">
      <div class="panel-header-left">
        <div class="panel-dot"></div>
        Input
      </div>
      <span class="line-count" id="input-lines">0 lines</span>
    </div>
    <div class="editor-wrap">
      <div class="line-numbers" id="line-numbers">1</div>
      <textarea
        class="editor-textarea"
        id="input"
        placeholder='Paste your JSON here...&#10;&#10;{"name": "World", "greeting": "Hello"}'
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
      ></textarea>
    </div>
    <div class="errors-panel" id="errors-panel" style="display:none;">
      <div class="errors-header">
        Diagnostics
        <span class="error-count" id="error-count">0</span>
      </div>
      <div id="errors-list"></div>
    </div>
    <div class="stats-bar" id="stats-bar" style="display:none;">
      <div class="stat-item"><span class="stat-label">keys:</span><span class="stat-val" id="stat-keys">—</span></div>
      <div class="stat-item"><span class="stat-label">depth:</span><span class="stat-val" id="stat-depth">—</span></div>
      <div class="stat-item"><span class="stat-label">size:</span><span class="stat-val" id="stat-size">—</span></div>
    </div>
  </div>

  <!-- Output Panel -->
  <div class="panel" style="display:flex;flex-direction:column;">
    <div class="panel-header">
      <div class="panel-header-left">
        <div class="panel-dot" style="background:var(--green)"></div>
        Formatted Output
      </div>
      <span class="line-count" id="output-lines"></span>
    </div>
    <div class="output-panel" id="output">
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <p>Formatted JSON will appear here with syntax highlighting</p>
      </div>
    </div>
  </div>
</div>

<div class="copy-toast" id="copy-toast">Copied to clipboard!</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const lineNumbers = document.getElementById('line-numbers');
const statusBadge = document.getElementById('status-badge');
const errorsPanel = document.getElementById('errors-panel');
const errorsList = document.getElementById('errors-list');
const errorCount = document.getElementById('error-count');
const statsBar = document.getElementById('stats-bar');

let lastValidJSON = null;
let debounceTimer;

// Theme
const themeToggle = document.getElementById('theme-toggle');
const html = document.documentElement;
let isDark = true;
themeToggle.addEventListener('click', () => {
  isDark = !isDark;
  html.setAttribute('data-theme', isDark ? 'dark' : 'light');
  themeToggle.textContent = isDark ? '☀️' : '🌙';
});

// Input handler
input.addEventListener('input', () => {
  updateLineNumbers();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(processInput, 300);
});

input.addEventListener('scroll', () => {
  lineNumbers.scrollTop = input.scrollTop;
});

input.addEventListener('keydown', (e) => {
  const indentSel = document.getElementById('indent-size').value;
  const indentStr = indentSel === 'tab' ? '\t' : ' '.repeat(parseInt(indentSel));

  if (e.key === 'Tab') {
    e.preventDefault();
    const start = input.selectionStart;
    const end = input.selectionEnd;
    input.value = input.value.substring(0, start) + indentStr + input.value.substring(end);
    input.selectionStart = input.selectionEnd = start + indentStr.length;
    updateLineNumbers();
    processInput();
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    const pos = input.selectionStart;
    const before = input.value.substring(0, pos);
    const after = input.value.substring(pos);

    // Current line indentation
    const lineStart = before.lastIndexOf('\n') + 1;
    const currentLine = before.substring(lineStart);
    const currentIndent = currentLine.match(/^(\s*)/)[1];

    // Last non-space char before cursor
    const trimmedBefore = before.trimEnd();
    const lastChar = trimmedBefore[trimmedBefore.length - 1];

    // First non-space char after cursor (on same remainder of line, not next lines)
    const restOfLine = after.split('\n')[0];
    const firstCharAfter = restOfLine.trimStart()[0];

    let newValue, newPos;

    if ((lastChar === '{' || lastChar === '[') && (firstCharAfter === '}' || firstCharAfter === ']')) {
      // Cursor between {} or [] on same line — split with inner indent + closing on own line
      const innerLine = '\n' + currentIndent + indentStr;
      const closingLine = '\n' + currentIndent;
      newValue = before + innerLine + closingLine + after;
      newPos = pos + innerLine.length;
    } else if (lastChar === '{' || lastChar === '[') {
      // After opening brace — increase indent
      const ins = '\n' + currentIndent + indentStr;
      newValue = before + ins + after;
      newPos = pos + ins.length;
    } else if (firstCharAfter === '}' || firstCharAfter === ']') {
      // Closing brace is immediately after cursor on this line — 
      // dedent the closing brace: move it to a new line at parent indent
      const parentIndent = currentIndent.substring(0, Math.max(0, currentIndent.length - indentStr.length));
      // Strip leading spaces from restOfLine so closing brace lands at parentIndent
      const trimmedAfter = after.trimStart();
      const ins = '\n' + currentIndent + '\n' + parentIndent;
      newValue = before + ins + trimmedAfter;
      newPos = pos + ('\n' + currentIndent).length;
    } else {
      // Normal newline — preserve current indent
      const ins = '\n' + currentIndent;
      newValue = before + ins + after;
      newPos = pos + ins.length;
    }

    input.value = newValue;
    input.selectionStart = input.selectionEnd = newPos;
    updateLineNumbers();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(processInput, 300);
  }
});

function updateLineNumbers() {
  const lines = input.value.split('\n').length;
  const nums = Array.from({length: lines}, (_, i) => i + 1).join('\n');
  lineNumbers.textContent = nums;
  document.getElementById('input-lines').textContent = `${lines} line${lines !== 1 ? 's' : ''}`;
}

function processInput() {
  const raw = input.value.trim();
  if (!raw) {
    resetUI();
    return;
  }
  try {
    const parsed = JSON.parse(raw);
    lastValidJSON = parsed;
    showSuccess(parsed);
    renderOutput(parsed);
  } catch (e) {
    lastValidJSON = null;
    showError(e, raw);
    output.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠</div><p>Fix the errors to see formatted output</p></div>';
    document.getElementById('output-lines').textContent = '';
  }
}

function resetUI() {
  statusBadge.className = 'badge badge-idle';
  statusBadge.textContent = 'Waiting for input';
  errorsPanel.style.display = 'none';
  statsBar.style.display = 'none';
  document.getElementById('fmt-input-btn').style.display = 'none';
  output.innerHTML = '<div class="empty-state"><div class="empty-icon">✦</div><p>Formatted JSON will appear here with syntax highlighting</p></div>';
  document.getElementById('output-lines').textContent = '';
  lastValidJSON = null;
}

function showSuccess(parsed) {
  statusBadge.className = 'badge badge-valid';
  statusBadge.textContent = '✓ Valid JSON';
  errorsPanel.style.display = 'none';
  document.getElementById('fmt-input-btn').style.display = 'flex';

  const stats = computeStats(parsed);
  document.getElementById('stat-keys').textContent = stats.keys;
  document.getElementById('stat-depth').textContent = stats.depth;
  document.getElementById('stat-size').textContent = formatBytes(new TextEncoder().encode(JSON.stringify(parsed)).length);
  statsBar.style.display = 'flex';
}

function showError(e, raw) {
  statusBadge.className = 'badge badge-invalid';
  statusBadge.textContent = '✗ Invalid JSON';
  statsBar.style.display = 'none';
  document.getElementById('fmt-input-btn').style.display = 'none';

  const errors = parseError(e, raw);
  errorCount.textContent = errors.length;
  errorsList.innerHTML = errors.map(err => `
    <div class="error-item">
      <div class="error-icon" style="color:var(--red)">⊗</div>
      <div class="error-body">
        <div class="error-msg">${escHtml(err.message)}</div>
        <div class="error-hint">${err.hint}</div>
      </div>
      <div class="error-location">${err.location}</div>
    </div>
  `).join('');
  errorsPanel.style.display = 'block';
}

function parseError(e, raw) {
  const msg = e.message;
  const errors = [];

  let location = '';
  const posMatch = msg.match(/position (\d+)/i) || msg.match(/column (\d+)/i);
  let pos = posMatch ? parseInt(posMatch[1]) : -1;

  if (pos >= 0) {
    const before = raw.substring(0, pos);
    const line = before.split('\n').length;
    const col = pos - before.lastIndexOf('\n');
    location = `Ln ${line}, Col ${col}`;
  }

  let hint = '';
  let cleanMsg = msg;

  if (/unexpected token/i.test(msg) || /unexpected end/i.test(msg)) {
    cleanMsg = 'Unexpected token in JSON';
    const char = msg.match(/token (.+?) in/i)?.[1] || '';

    if (char === 'undefined' || char === "'") {
      hint = `Use double quotes for strings: <code>"value"</code> not <code>'value'</code>`;
    } else if (char === ',') {
      hint = `Check for trailing commas — JSON doesn't allow them: <code>{"a":1}</code> not <code>{"a":1,}</code>`;
    } else if (/^[A-Z]/.test(char)) {
      hint = `Booleans and null must be lowercase: <code>true</code>, <code>false</code>, <code>null</code>`;
    } else if (char === 'u') {
      hint = `<code>undefined</code> is not valid JSON. Use <code>null</code> instead`;
    } else {
      hint = `Ensure all keys are quoted and values use valid JSON types`;
    }
  } else if (/end of json/i.test(msg) || /unexpected end/i.test(msg)) {
    hint = `Missing closing bracket, brace, or quote. Check your <code>]</code> <code>}</code> <code>"</code>`;
  } else if (/expected.*property name/i.test(msg)) {
    hint = `Object keys must be strings in double quotes: <code>{"key": "value"}</code>`;
  } else if (/trailing comma/i.test(msg)) {
    hint = `Remove trailing commas — JSON is strict: <code>{"a":1, "b":2}</code>`;
  } else if (/duplicate key/i.test(msg)) {
    hint = `Duplicate keys are not allowed in a single object`;
  } else {
    hint = `Ensure proper JSON syntax: quoted keys, no trailing commas, valid value types`;
  }

  errors.push({ message: cleanMsg, hint, location });

  // Extra hints for common patterns
  if (/undefined/i.test(raw)) {
    errors.push({ message: 'Found "undefined" in input', hint: `<code>undefined</code> is a JavaScript value, not valid JSON. Replace with <code>null</code>`, location: '' });
  }
  if (/'/.test(raw)) {
    errors.push({ message: 'Single quotes detected', hint: `JSON requires double quotes: <code>"key"</code> not <code>'key'</code>`, location: '' });
  }
  const trailingComma = raw.match(/,\s*[}\]]/);
  if (trailingComma) {
    errors.push({ message: 'Trailing comma found', hint: `Remove the comma before <code>}</code> or <code>]</code> — JSON forbids trailing commas`, location: '' });
  }
  if (/\/\/|\/\*/.test(raw)) {
    errors.push({ message: 'Comments are not valid JSON', hint: `JSON does not support <code>//</code> or <code>/* */</code> comments. Remove them.`, location: '' });
  }

  return errors.slice(0, 3);
}


// ── Tree renderer ────────────────────────────────────────────────────────────
// Each row: { type, depth, keyName, bracket, val, comma, id, closerIdx }
// type: 'opener' | 'closer' | 'leaf'
// collapsedSet: Set of opener row indices that are collapsed

let _rows = [];
let _collapsed = new Set();

function renderOutput(data) {
  _rows = [];
  _collapsed = new Set();
  buildRows(data, _rows, 0, null, true);
  paintOutput();
}

// Build a flat list of rows from the JSON value.
// Each opener row gets closerIdx set after children are pushed.
function buildRows(val, rows, depth, keyName, isLast) {
  const comma = isLast ? '' : ',';
  const type = Array.isArray(val) ? 'array'
             : val === null        ? 'null'
             : typeof val;

  if (type === 'object' || type === 'array') {
    const open   = type === 'array' ? '[' : '{';
    const close  = type === 'array' ? ']' : '}';
    const keys   = type === 'array' ? val.map((_, i) => i) : Object.keys(val);
    const count  = keys.length;

    const openerIdx = rows.length;
    rows.push({ type: 'opener', depth, keyName, bracket: open, count, valType: type, val, comma: count === 0 ? close + comma : '', closerIdx: -1 });

    if (count > 0) {
      keys.forEach((k, i) => {
        buildRows(type === 'array' ? val[k] : val[k], rows, depth + 1, type === 'object' ? k : null, i === count - 1);
      });
      const closerIdx = rows.length;
      rows.push({ type: 'closer', depth, bracket: close, comma, openerIdx });
      rows[openerIdx].closerIdx = closerIdx;
    }
  } else {
    rows.push({ type: 'leaf', depth, keyName, val, valType: type, comma });
  }
}

function paintOutput() {
  const lineNums = [];
  const rowHtmls = [];
  let ln = 1;
  let i = 0;

  while (i < _rows.length) {
    const row = _rows[i];

    if (row.type === 'opener' && _collapsed.has(i)) {
      // Render collapsed opener as single summary line, then skip to closer
      lineNums.push(ln++);
      rowHtmls.push(renderOpener(row, i, true));
      i = row.closerIdx + 1; // jump past closer
      continue;
    }

    if (row.type === 'closer') {
      // Check if our opener is collapsed — if so, skip (handled above)
      if (_collapsed.has(row.openerIdx)) { i++; continue; }
    }

    lineNums.push(ln++);
    rowHtmls.push(renderRowHtml(row, i));
    i++;
  }

  output.innerHTML = `<div class="tree-wrap">
    <div class="tree-line-numbers">${lineNums.join('\n')}</div>
    <div class="tree-body">${rowHtmls.join('')}</div>
  </div>`;
  document.getElementById('output-lines').textContent = `${lineNums.length} lines`;
}

function renderRowHtml(row, idx) {
  if (row.type === 'opener') return renderOpener(row, idx, false);
  if (row.type === 'closer') return renderCloser(row);
  return renderLeaf(row);
}

function renderOpener(row, idx, collapsed) {
  const indent = makeIndent(row.depth);
  const keyHtml = fmtKey(row.keyName);

  // Empty container — single line, no toggle
  if (row.count === 0) {
    const bracket = row.bracket + (row.bracket === '[' ? ']' : '}') + row.comma.slice(1); // e.g. "[]," 
    // row.comma for empty is already close+outerComma
    return `<div class="tree-row">
      ${indent}<span class="toggle-placeholder"></span>
      ${keyHtml}<span class="j-bracket">${escHtml(row.comma)}</span>
    </div>`;
  }

  const toggle = `<span class="toggle-btn" onclick="toggleNode(${idx})">${collapsed ? '▶' : '▼'}</span>`;
  let content;

  if (collapsed) {
    const preview = row.valType === 'array'
      ? `${row.count} item${row.count !== 1 ? 's' : ''}`
      : `${row.count} key${row.count !== 1 ? 's' : ''}`;
    const closeB = row.bracket === '[' ? ']' : '}';
    // Find closer comma
    const closerComma = row.closerIdx >= 0 ? _rows[row.closerIdx].comma : '';
    content = `${keyHtml}<span class="j-bracket">${escHtml(row.bracket)}</span>`
            + `<span class="collapsed-preview"> … ${preview} </span>`
            + `<span class="j-bracket">${closeB}</span>`
            + `<span class="j-comma">${escHtml(closerComma)}</span>`;
  } else {
    content = `${keyHtml}<span class="j-bracket">${escHtml(row.bracket)}</span>`;
  }

  const copyStr = JSON.stringify(JSON.stringify(row.val, null, 2));
  return `<div class="tree-row">
    ${indent}${toggle}${content}
    <span class="row-copy" onclick="copyText(${copyStr})">copy</span>
  </div>`;
}

function renderCloser(row) {
  const indent = makeIndent(row.depth);
  return `<div class="tree-row">
    ${indent}<span class="toggle-placeholder"></span>
    <span class="j-bracket">${escHtml(row.bracket)}</span><span class="j-comma">${escHtml(row.comma)}</span>
  </div>`;
}

function renderLeaf(row) {
  const indent = makeIndent(row.depth);
  const keyHtml = fmtKey(row.keyName);
  let valHtml = '', copyVal = '';

  if (row.valType === 'string') {
    valHtml = `<span class="j-str">${escHtml(JSON.stringify(row.val))}</span>`;
    copyVal = row.val;
  } else if (row.valType === 'number') {
    valHtml = `<span class="j-num">${row.val}</span>`;
    copyVal = String(row.val);
  } else if (row.valType === 'boolean') {
    valHtml = `<span class="j-bool">${row.val}</span>`;
    copyVal = String(row.val);
  } else {
    valHtml = `<span class="j-null">null</span>`;
    copyVal = 'null';
  }

  const commaHtml = row.comma ? `<span class="j-comma">${escHtml(row.comma)}</span>` : '';
  const copyStr = JSON.stringify(copyVal);
  return `<div class="tree-row">
    ${indent}<span class="toggle-placeholder"></span>
    ${keyHtml}${valHtml}${commaHtml}
    <span class="row-copy" onclick="copyText(${copyStr})">copy</span>
  </div>`;
}

function fmtKey(keyName) {
  if (keyName == null) return '';
  return `<span class="j-key">"${escHtml(String(keyName))}"</span><span class="j-colon">:</span>`;
}

function makeIndent(depth) {
  let s = '';
  for (let i = 0; i < depth; i++) s += '<span class="indent-guide"></span>';
  return s;
}

function toggleNode(idx) {
  if (_collapsed.has(idx)) _collapsed.delete(idx);
  else _collapsed.add(idx);
  paintOutput();
}

function escHtml(s) {
  if (typeof s !== 'string') s = String(s);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}



function formatJSON() {
  if (lastValidJSON !== null) {
    renderOutput(lastValidJSON);
  } else {
    processInput();
  }
}

function minifyJSON() {
  if (!lastValidJSON) { processInput(); return; }
  const mini = JSON.stringify(lastValidJSON);
  output.innerHTML = `<div class="tree-wrap"><div class="tree-line-numbers">1</div><div class="tree-body"><div class="tree-row" style="white-space:normal;word-break:break-all;padding:14px 16px;align-items:flex-start;">${escHtml(mini)}</div></div></div>`;
  document.getElementById('output-lines').textContent = '1 line';
}

function sortKeys() {
  if (!lastValidJSON) { processInput(); return; }
  const sorted = sortObjKeys(lastValidJSON);
  renderOutput(sorted);
}

function sortObjKeys(val) {
  if (Array.isArray(val)) return val.map(sortObjKeys);
  if (val !== null && typeof val === 'object') {
    return Object.keys(val).sort().reduce((acc, k) => {
      acc[k] = sortObjKeys(val[k]);
      return acc;
    }, {});
  }
  return val;
}

function computeStats(data, depth = 0) {
  let keys = 0, maxDepth = depth;
  if (Array.isArray(data)) {
    data.forEach(item => {
      const sub = computeStats(item, depth + 1);
      keys += sub.keys;
      maxDepth = Math.max(maxDepth, sub.depth);
    });
  } else if (data !== null && typeof data === 'object') {
    Object.entries(data).forEach(([k, v]) => {
      keys++;
      const sub = computeStats(v, depth + 1);
      keys += sub.keys;
      maxDepth = Math.max(maxDepth, sub.depth);
    });
  }
  return { keys, depth: maxDepth };
}

function formatBytes(n) {
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
  return `${(n / 1024 / 1024).toFixed(2)} MB`;
}

function copyText(text) {
  // Try modern clipboard API first, fall back to execCommand for sandboxed iframes
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showCopyToast).catch(() => copyFallback(text));
  } else {
    copyFallback(text);
  }
}

function copyFallback(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); showCopyToast(); } catch(e) {}
  document.body.removeChild(ta);
}

function showCopyToast() {
  const toast = document.getElementById('copy-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function copyOutput() {
  if (!lastValidJSON) return;
  const indentSel = document.getElementById('indent-size').value;
  const indent = indentSel === 'tab' ? '\t' : parseInt(indentSel);
  copyText(JSON.stringify(lastValidJSON, null, indent));
}


function formatInput() {
  if (!lastValidJSON) return;
  const indentSel = document.getElementById('indent-size').value;
  const indent = indentSel === 'tab' ? '\t' : parseInt(indentSel);
  const formatted = JSON.stringify(lastValidJSON, null, indent);
  input.value = formatted;
  updateLineNumbers();
  processInput();
  // Brief flash to confirm
  input.style.transition = 'background 0.15s';
  input.style.background = 'var(--accent-glow)';
  setTimeout(() => { input.style.background = ''; }, 300);
}

function clearAll() {
  input.value = '';
  updateLineNumbers();
  resetUI();
}

function loadSample() {

    "user": {

    },

updateLineNumbers();
