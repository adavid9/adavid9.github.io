r>3. <strong>Construction</strong> - building object to spec", "code": "<span class=\"kw\">class</span> <span class=\"cls\">DelinquentInvoiceSpec</span> {\n  <span class=\"fn\">constructor</span>(currentDate) {\n    <span class=\"kw\">this</span>.currentDate = currentDate;\n  }\n  <span class=\"fn\">isSatisfiedBy</span>(invoice) {\n    <span class=\"kw\">const</span> grace = invoice.customer.<span class=\"fn\">getGracePeriod</span>();\n    <span class=\"kw\">return</span> invoice.dueDate &lt; <span class=\"fn\">subtractDays</span>(<span class=\"kw\">this</span>.currentDate, grace);\n  }\n}"}, {"cat": "Refactoring", "q": "What is a Breakthrough in DDD?", "sub": "Chapter 8", "term": "Breakthrough", "def": "A moment when, after prolonged work with the model, a <strong>sudden deep understanding</strong> of the domain occurs, leading to radical simplification of the model and code.<br><br><strong>Signals of an approaching breakthrough:</strong><br>- Many special cases and exceptions<br>- Code becomes increasingly complex for simple cases<br>- Experts say it is really the same as...", "code": null}, {"cat": "Refactoring", "q": "How to recognize the need for a deeper model?", "sub": "Implicit vs Explicit Concepts", "term": "Making Implicit Concepts Explicit", "def": "Many important domain concepts are <strong>hidden</strong> in method logic or comments. DDD encourages surfacing them explicitly.<br><br><strong>Signals of a hidden concept:</strong><br>- Complex if/else conditionals<br>- Comments explaining business rules<br>- Expert has a name for something that is just an if in code", "code": null}, {"cat": "Practice", "q": "What is an Anemic Domain Model?", "sub": "Anti-pattern", "term": "Anemic Domain Model", "def": "A model where domain objects are <strong>data containers</strong> (getters/setters) with no business logic, and all logic is in services.<br><br><strong>Why it is wrong:</strong><br>- Violates encapsulation and OOP<br>- Business logic scattered across services<br>- Model does not enforce its invariants", "code": "<span class=\"cmt\">// Anemic - no logic</span>\n<span class=\"kw\">class</span> <span class=\"cls\">Order</span> {\n  <span class=\"fn\">getStatus</span>() { <span class=\"kw\">return this</span>.status; }\n  <span class=\"fn\">setStatus</span>(s) { <span class=\"kw\">this</span>.status = s; }\n}\n\n<span class=\"cmt\">// Rich - logic in the object</span>\n<span class=\"kw\">class</span> <span class=\"cls\">Order</span> {\n  <span class=\"fn\">confirm</span>() {\n    <span class=\"kw\">if</span> (<span class=\"kw\">this</span>.items.length === 0)\n      <span class=\"kw\">throw new</span> <span class=\"cls\">Error</span>(<span class=\"str\">\"Empty order\"</span>);\n    <span class=\"kw\">this</span>.status = <span class=\"str\">\"CONFIRMED\"</span>;\n  }\n}"}, {"cat": "Practice", "q": "What is Big Ball of Mud?", "sub": "Anti-pattern to recognize", "term": "Big Ball of Mud", "def": "A system with no discernible architecture - spaghetti code where everything is tangled.<br><br>Evans recommends:<br>1. Use Bounded Context to mark chaos boundaries<br>2. Use Anti-Corruption Layer for integration<br>3. Isolate chaos and surround it with order<br><br><strong>Key:</strong> Don't pretend chaos doesn't exist - mark it on the context map.", "code": null}, {"cat": "Advanced", "q": "What is Event Storming?", "sub": "Domain discovery technique", "term": "Event Storming", "def": "A workshop method (Alberto Brandolini) for rapidly discovering the domain by <strong>mapping Domain Events</strong> on a board with sticky notes.<br><br><strong>Format:</strong> Experts and developers together: events (orange), commands (blue), aggregates (yellow), views (green).<br><br><strong>Outcome:</strong> Quick discovery of Bounded Contexts, aggregates, and process flows.", "code": null}, {"cat": "Advanced", "q": "CQRS and DDD - how do they connect?", "sub": "Command Query Responsibility Segregation", "term": "CQRS in DDD", "def": "CQRS separates the <strong>write model</strong> (Command side - rich domain model) from the <strong>read model</strong> (Query side - optimized views).<br><br><strong>Benefits in DDD:</strong><br>- Command side: full domain model with aggregates<br>- Query side: simple DTOs / projections<br>- Avoid model compromises for both purposes simultaneously", "code": "<span class=\"cmt\">// Command side - rich model</span>\n<span class=\"kw\">class</span> <span class=\"cls\">PlaceOrderHandler</span> {\n  <span class=\"fn\">handle</span>(cmd) {\n    <span class=\"kw\">const</span> order = <span class=\"kw\">this</span>.factory.<span class=\"fn\">create</span>(cmd);\n    order.<span class=\"fn\">place</span>();\n    <span class=\"kw\">this</span>.repo.<span class=\"fn\">save</span>(order);\n  }\n}\n<span class=\"cmt\">// Query side - flat projection</span>\n<span class=\"kw\">class</span> <span class=\"cls\">OrderSummaryQuery</span> {\n  <span class=\"fn\">getByCustomer</span>(id) {\n    <span class=\"kw\">return this</span>.db.<span class=\"fn\">query</span>(<span class=\"str\">\"SELECT * FROM order_views WHERE customer_id=?\"</span>, id);\n  }\n}"}, {"cat": "Advanced", "q": "Event Sourcing - connection with DDD", "sub": "Persistence through events", "term": "Event Sourcing", "def": "A pattern where aggregate state is stored as a <strong>sequence of Domain Events</strong>, not a snapshot of current state.<br><br><strong>Aggregate state:</strong> Reconstructed by replaying the event history from the beginning.<br><br><strong>Pros:</strong> Full audit history, natural Domain Events<br><strong>Cons:</strong> Complex implementation, event schema evolution", "code": null}]
};

var lang = "pl";
var theme = "dark";
var activeCat = I18N[lang].all;
var cards = CARDS[lang].slice();
var idx = 0;
var flipped = false;
var known = {};
var unknown = {};

/* ── THEME ────────────────────────────────── */
function applyTheme(t) {
  theme = t;
  var body = document.body;
  if (t === "system") {
    var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    body.setAttribute("data-theme", prefersDark ? "dark" : "light");
  } else {
    body.setAttribute("data-theme", t);
  }
  document.getElementById("btnThemeLight").classList.toggle("active", t==="light");
  document.getElementById("btnThemeDark").classList.toggle("active", t==="dark");
  document.getElementById("btnThemeSystem").classList.toggle("active", t==="system");
  try { localStorage.setItem("ddd_theme", t); } catch(e){}
}

document.getElementById("btnThemeLight").addEventListener("click", function(){ applyTheme("light"); });
document.getElementById("btnThemeDark").addEventListener("click", function(){ applyTheme("dark"); });
document.getElementById("btnThemeSystem").addEventListener("click", function(){ applyTheme("system"); });

window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(){
  if (theme === "system") applyTheme("system");
});

/* ── LANGUAGE ─────────────────────────────── */
function applyLang(l) {
  lang = l;
  var t = I18N[l];
  activeCat = t.all;
  document.getElementById("btnLangPL").classList.toggle("active-lang", l==="pl");
  document.getElementById("btnLangEN").classList.toggle("active-lang", l==="en");
  document.getElementById("btnLangPL").classList.toggle("active", false);
  document.getElementById("btnLangEN").classList.toggle("active", false);
  // UI strings
  document.getElementById("lTotal").textContent = t.total;
  document.getElementById("lKnown").textContent = t.known;
  document.getElementById("lUnknown").textContent = t.learning;
  document.getElementById("flipHint").textContent = t.flip;
  document.getElementById("lPrev").textContent = t.prev;
  document.getElementById("lNext").textContent = t.next;
  document.getElementById("lUnk").textContent = t.unkBtn;
  document.getElementById("lKnow").textContent = t.knowBtn;
  document.getElementById("sProgress").childNodes[0].textContent = t.progress + " ";
  document.getElementById("sCategories").childNodes[0].textContent = t.categories + " ";
  document.getElementById("sShortcuts").childNodes[0].textContent = t.shortcuts + " ";
  document.getElementById("lShuf").textContent = t.shuffle;
  document.getElementById("llK").textContent = t.llK;
  document.getElementById("llU").textContent = t.llU;
  document.getElementById("llN").textContent = t.llN;
  document.getElementById("sc1").textContent = t.sc1;
  document.getElementById("sc2").textContent = t.sc2;
  document.getElementById("sc3").textContent = t.sc3;
  document.getElementById("sc4").textContent = t.sc4;
  document.getElementById("sc5").textContent = t.sc5;
  document.getElementById("sc6").textContent = t.sc6;
  document.getElementById("ovTitle").textContent = t.ovTitle;
  document.getElementById("ovSub").textContent = t.ovSub;
  document.getElementById("btnRestart").textContent = t.restart;
  // Reset cards
  known = {}; unknown = {};
  cards = CARDS[lang].slice();
  idx = 0; flipped = false;
  document.getElementById("fc").classList.remove("flipped");
  buildCatBar();
  renderCard();
  updateStats();
  try { localStorage.setItem("ddd_lang", l); } catch(e){}
}

document.getElementById("btnLangPL").addEventListener("click", function(){ applyLang("pl"); });
document.getElementById("btnLangEN").addEventListener("click", function(){ applyLang("en"); });

/* ── CATEGORIES ───────────────────────────── */
function getCategories() {
  var cats = [I18N[lang].all];
  var seen = {};
  CARDS[lang].forEach(function(c) {
    if (!seen[c.cat]) { seen[c.cat] = true; cats.push(c.cat); }
  });
  return cats;
}

function buildCatBar() {
  var bar = document.getElementById("catbar");
  bar.innerHTML = "";
  getCategories().forEach(function(cat) {
    var btn = document.createElement("button");
    btn.className = "catbtn" + (cat === activeCat ? " active" : "");
    btn.textContent = cat;
    btn.addEventListener("click", function() { setCategory(cat); });
    bar.appendChild(btn);
  });
}

function setCategory(cat) {
  activeCat = cat;
  var allLabel = I18N[lang].all;
  if (cat === allLabel) {
    cards = CARDS[lang].slice();
  } else {
    cards = CARDS[lang].filter(function(c) { return c.cat === cat; });
  }
  idx = 0; flipped = false;
  document.getElementById("fc").classList.remove("flipped");
  buildCatBar();
  renderCard();
  updateStats();
}

/* ── RENDER ───────────────────────────────── */
function renderCard() {
  if (idx >= cards.length) { showOverlay(); return; }
  var c = cards[idx];
  var t = I18N[lang];
  document.getElementById("fCat").textContent = c.cat;
  document.getElementById("bCat").textContent = c.cat;
  document.getElementById("fQ").textContent = c.q;
  document.getElementById("fSub").textContent = c.sub;
  document.getElementById("bTerm").textContent = c.term;
  var defHtml = c.def;
  if (c.code) { defHtml += "<div class=\"code-block\">" + c.code + "</div>"; }
  document.getElementById("bDef").innerHTML = defHtml;
  document.getElementById("counter").textContent = t.card + " " + (idx+1) + " " + t.of + " " + cards.length;
  document.getElementById("progBar").style.width = Math.round((idx/cards.length)*100) + "%";
  flipped = false;
  document.getElementById("fc").classList.remove("flipped");
}

/* ── ACTIONS ──────────────────────────────── */
function flipCard() {
  flipped = !flipped;
  document.getElementById("fc").classList.toggle("flipped", flipped);
}
function nextCard() {
  if (idx < cards.length-1) { idx++; renderCard(); } else { showOverlay(); }
}
function prevCard() {
  if (idx > 0) { idx--; renderCard(); }
}
function markKnown() {
  var c = cards[idx];
  known[lang+":"+c.q] = true;
  delete unknown[lang+":"+c.q];
  updateStats(); nextCard();
}
function markUnknown() {
  var c = cards[idx];
  unknown[lang+":"+c.q] = true;
  delete known[lang+":"+c.q];
  updateStats(); nextCard();
}
function shuffleCards() {
  for (var i=cards.length-1; i>0; i--) {
    var j=Math.floor(Math.random()*(i+1));
    var tmp=cards[i]; cards[i]=cards[j]; cards[j]=tmp;
  }
  idx=0; flipped=false;
  document.getElementById("fc").classList.remove("flipped");
  renderCard();
}

/* ── STATS ────────────────────────────────── */
function updateStats() {
  var total = CARDS[lang].length;
  var kKeys = Object.keys(known).filter(function(k){ return k.indexOf(lang+":") === 0; });
  var uKeys = Object.keys(unknown).filter(function(k){ return k.indexOf(lang+":") === 0; });
  var k = kKeys.length, u = uKeys.length;
  document.getElementById("hTotal").textContent = total;
  document.getElementById("hKnown").textContent = k;
  document.getElementById("hUnknown").textContent = u;
  var circ=188.5, kD=(k/total)*circ, uD=(u/total)*circ;
  document.getElementById("dgK").style.strokeDasharray = kD + " " + circ;
  document.getElementById("dgU").style.strokeDasharray = uD + " " + circ;
  document.getElementById("dgU").style.strokeDashoffset = -kD;
  document.getElementById("dgPct").textContent = Math.round((k/total)*100) + "%";
  document.getElementById("lgK").textContent = k;
  document.getElementById("lgU").textContent = u;
  document.getElementById("lgN").textContent = total - k - u;
  updateKList();
}

function updateKList() {
  var cats = [];
  var seen = {};
  CARDS[lang].forEach(function(c){ if(!seen[c.cat]){seen[c.cat]=true; cats.push(c.cat);} });
  var html = "";
  cats.forEach(function(cat) {
    var cc = CARDS[lang].filter(function(c){ return c.cat===cat; });
    var k = cc.filter(function(c){ return known[lang+":"+c.q]; }).length;
    var u = cc.filter(function(c){ return unknown[lang+":"+c.q]; }).length;
    var badge, cls;
    if (k===cc.length) { badge=I18N[lang].done; cls="kn2"; }
    else if (k>0||u>0) { badge=k+"/"+cc.length; cls=(k>=u)?"kn2":"un"; }
    else { badge="0/"+cc.length; cls="nt"; }
    html += "<div class=\"ki\"><span class=\"kn\">"+cat+"</span><span class=\"kb "+cls+"\">"+badge+"</span></div>";
  });
  document.getElementById("kList").innerHTML = html;
}

/* ── OVERLAY ──────────────────────────────── */
function showOverlay() {
  var t = I18N[lang];
  var k = cards.filter(function(c){ return known[lang+":"+c.q]; }).length;
  document.getElementById("ovScore").textContent = t.knowLabel+": "+k+" / "+cards.length;
  document.getElementById("overlay").classList.add("show");
}

function restart() {
  known={}; unknown={};
  idx=0; flipped=false;
  var allLabel = I18N[lang].all;
  cards = activeCat===allLabel ? CARDS[lang].slice() : CARDS[lang].filter(function(c){ return c.cat===activeCat; });
  document.getElementById("fc").classList.remove("flipped");
  document.getElementById("overlay").classList.remove("show");
  renderCard(); updateStats();
}

/* ── EVENT LISTENERS ──────────────────────── */
document.getElementById("fc").addEventListener("click", flipCard);
document.getElementById("btnPrev").addEventListener("click", prevCard);
document.getElementById("btnNext").addEventListener("click", nextCard);
document.getElementById("btnKnow").addEventListener("click", markKnown);
document.getElementById("btnUnk").addEventListener("click", markUnknown);
document.getElementById("btnShuf").addEventListener("click", shuffleCards);
document.getElementById("btnRestart").addEventListener("click", restart);

document.addEventListener("keydown", function(e) {
  var tag = document.activeElement.tagName;
  if (tag==="INPUT"||tag==="TEXTAREA") return;
  if (e.key===" ") { e.preventDefault(); flipCard(); }
  else if (e.key==="ArrowRight") { nextCard(); }
  else if (e.key==="ArrowLeft") { prevCard(); }
  else if (e.key==="k"||e.key==="K") { markKnown(); }
  else if (e.key==="u"||e.key==="U") { markUnknown(); }
  else if (e.key==="s"||e.key==="S") { shuffleCards(); }
});

/* ── INIT ─────────────────────────────────── */
(function(){
  var savedTheme = "dark";
  var savedLang = "pl";
  try { savedTheme = localStorage.getItem("ddd_theme") || "dark"; } catch(e){}
  try { savedLang = localStorage.getItem("ddd_lang") || "pl"; } catch(e){}
  applyTheme(savedTheme);
  applyLang(savedLang);
})();
</script>
</body>
